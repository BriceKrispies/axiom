# Axiom CI.
#
# The single gate for the repo. Every check the old local pre-commit hook ran now
# lives here, so `main` is protected by CI rather than by a local hook:
#   * the `check` job — formatting, clippy, the full test suite, the architecture
#     checker (Axiom Layer/Module Law), the 100% coverage gate (Axiom Coverage
#     Law), a wasm build, and the TypeScript SDK gate; and
#   * the `lint` job — the engine dylint rulebook, ratcheted against
#     tools/lints/dylint-baseline.txt (this is the check that used to live only in
#     the pre-commit hook).
# The architecture check is also covered by `cargo test` (the
# `real_repo_layers_pass` test), but it is run explicitly here so a failure is
# obvious and actionable in the job log.
name: ci

# CI is DISABLED for automatic runs (2026-07-14): the runners' stable
# toolchain moved to clippy 1.96, which fails on ~100 pre-existing spine
# warnings (including lints that conflict with the Branchless Law's canonical
# idioms) — a remediation pass with its own policy decision. Until that lands,
# the gates run locally (check-architecture, coverage, dylint-gate, ts-gate)
# and this workflow can still be started by hand from the Actions tab.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          # Nightly + llvm-tools power the coverage gate's true branch coverage.
          rustup toolchain install nightly --profile minimal --component llvm-tools-preview
          rustup target add wasm32-unknown-unknown
          rustup default stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # The engine reuses retained buffers and reuses (never re-spawns) the sole
      # camera node, so a steady-state frame allocates almost nothing and retains
      # nothing new. This gate pins the recurring "gets unplayably laggy after
      # ~1h" regression from two angles: (1) per-frame heap churn must stay under
      # budget, and (2) live heap BLOCKS must not grow across the run's second
      # half — a per-frame retained leak (e.g. a scene node spawned every frame
      # and never despawned, the original set_camera bug) trips the growth gate
      # even when the bytes look small. Both budgets are ratchets: lower them as
      # the numbers are driven down further, never raise them to make a change
      # pass — fix the leak at the engine level instead.
      - name: Render-churn + retained-growth gate
        run: cargo run --release -p axiom-end-zone --example leakcheck -- --frames 6000 --max-mb-per-frame 1.8 --max-block-growth 30

      - name: Architecture check (Axiom Layer Law)
        run: cargo xtask check-architecture

      - name: Coverage gate (Axiom Coverage Law — 100%)
        run: bash scripts/coverage.sh

      - name: Kernel wasm build
        run: cargo build --target wasm32-unknown-unknown -p axiom-kernel

      # The TypeScript SDK (packages/axiom-client) is held to TS-native versions of
      # the engine laws: tsgo typecheck, Oxlint (every category an error + the
      # branch ban), and node:test 100% coverage. See packages/axiom-client/STATIC_ANALYSIS.md.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: TypeScript SDK deps
        run: npm --prefix packages/axiom-client install --no-audit --no-fund

      - name: TypeScript SDK gate (tsgo + Oxlint + 100% coverage)
        run: bash scripts/ts-gate.sh

  # The engine dylint rulebook (the check that used to run only in the local
  # pre-commit hook). It builds its lint drivers against the pinned nightly in
  # tools/lints/rust-toolchain, then ratchets findings against
  # tools/lints/dylint-baseline.txt. Kept a separate job because it needs that
  # dedicated toolchain and runs in parallel with `check`.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the dylint toolchain
        run: |
          # The lint drivers compile against rustc internals, so this pinned
          # nightly needs rustc-dev + llvm-tools-preview. dylint selects it
          # automatically via tools/lints/rust-toolchain.
          rustup toolchain install nightly-2026-04-16 --profile minimal --component rustc-dev,llvm-tools-preview
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
            tools/lints/target
          key: ${{ runner.os }}-dylint-${{ hashFiles('**/Cargo.lock', 'tools/lints/**/Cargo.toml') }}

      - name: Install cargo-dylint (pinned to the rulebook's dylint_linting version)
        # The cargo cache restores ~/.cargo/bin, and a plain `cargo install`
        # refuses to overwrite an existing binary — so skip when the pinned
        # version is already present and force-reinstall otherwise.
        run: |
          cargo dylint --version 2>/dev/null | grep -q '^cargo-dylint 6\.0\.1$' \
            || cargo install cargo-dylint@6.0.1 dylint-link@6.0.1 --locked --force

      - name: Dylint rulebook gate (engine lint ratchet)
        run: bash scripts/dylint-gate.sh
