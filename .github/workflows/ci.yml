# Axiom CI.
#
# Runs formatting, lints, the full test suite, the architecture checker, the
# 100% coverage gate (the Axiom Coverage Law), and a wasm build of the kernel.
# The architecture check is also covered by `cargo test` (the
# `real_repo_layers_pass` test), but it is run explicitly here so a failure is
# obvious and actionable in the job log.
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          # Nightly + llvm-tools power the coverage gate's true branch coverage.
          rustup toolchain install nightly --profile minimal --component llvm-tools-preview
          rustup target add wasm32-unknown-unknown
          rustup default stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Architecture check (Axiom Layer Law)
        run: cargo xtask check-architecture

      - name: Coverage gate (Axiom Coverage Law — 100%)
        run: bash scripts/coverage.sh

      - name: Kernel wasm build
        run: cargo build --target wasm32-unknown-unknown -p axiom-kernel
