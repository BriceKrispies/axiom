# Build the browser/WASM demos and publish the mobile-first demo gallery
# to GitHub Pages on every push to main.
#
# This is repo tooling, NOT part of the engine dependency graph — same status as
# the CI workflow, the Makefile, and scripts/. It PACKAGES each standalone demo
# app (scripts/package_gallery.py) into dist/<id>/ behind its capability-detecting
# loader, with the static landing grid (apps/axiom-gallery/web) laid over dist/,
# matching `make gallery`, and deploys it.
#
# It runs the FAST packaging path (`--fast`: a normal wasm-bindgen build behind the
# loader, no wasm2js fallback), to keep the deploy quick and on stable. `make gallery`
# locally builds the deploy-grade bundles WITH the wasm2js fallback; to deploy those,
# switch the package step to drop `--fast` and add a nightly toolchain + rust-src
# (the fallback needs the MVP `-Z build-std` rebuild).
#
# One-time setup: enable Pages in repo Settings → Pages → Source: GitHub Actions.
name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the OIDC id-token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
          rustup default stable

      # Pin wasm-bindgen-cli to the exact wasm-bindgen version locked in
      # Cargo.lock — a mismatched generator errors out, so we read it rather
      # than hardcode it.
      - name: Resolve wasm-bindgen version
        id: wb
        run: |
          version="$(cargo metadata --format-version 1 --locked \
            | python3 -c 'import json,sys; pkgs=json.load(sys.stdin)["packages"]; print(next(p["version"] for p in pkgs if p["name"]=="wasm-bindgen"))')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "wasm-bindgen $version"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wb.outputs.version }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pages-${{ hashFiles('**/Cargo.lock') }}

      # Package every demo app into dist/<id>/ behind its loader (scripts/package_gallery.py,
      # the same driver `make gallery` uses). `--fast` keeps this on stable with no
      # wasm2js fallback.
      - name: Package the gallery (dist/)
        run: |
          npm --prefix scripts/packaging install --no-audit --no-fund
          python3 scripts/package_gallery.py --fast

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
