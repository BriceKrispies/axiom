# Axiom app manifest — axiom-asset-stream-demo.
#
# A browser demo of runtime asset streaming. It boots fast and then streams
# assets in the background, async + in parallel, driven by the deterministic
# scheduler in the `assets` module (composed via its `AssetsApi` facade). The app
# performs the fetches the scheduler asks for and feeds completions back — the
# host-boundary pattern. It depends on the `kernel` layer only for the `AssetId`
# identity primitive the facade traffics in. It depends on no other app — apps are
# leaves in the graph.

[app]
name = "asset-stream-demo"
crate_name = "axiom-asset-stream-demo"

allowed_layers = [
    "kernel",
]

allowed_modules = [
    "assets",
]
