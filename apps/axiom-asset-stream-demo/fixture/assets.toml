# Packed by `tools/axiom-asset-pack` (`make asset-stream-pack`) into manifest.bin.
# DAG is crafted so the e2e test can assert streaming order: hero(3) ready after
# atlas(1); material(4) ready after palette(2) and hero(3).

[[asset]]
id = 1
kind = 1            # texture
priority = 10
source = "src/atlas.bin"

[[asset]]
id = 2
kind = 1            # texture
priority = 20
source = "src/palette.bin"

[[asset]]
id = 3
kind = 2            # mesh
priority = 5
source = "src/hero.bin"
dependencies = [1]  # hero mesh needs the atlas texture

[[asset]]
id = 4
kind = 3            # material
priority = 30
source = "src/material.bin"
dependencies = [2, 3]  # material needs the palette and the hero mesh

[[asset]]
id = 5
kind = 4            # sound
priority = 1
source = "src/theme.bin"

# Assets 6-10 widen the root set (6 roots vs. the default 3 workers) so the
# pending queue genuinely fills and the pool drains it.

[[asset]]
id = 6
kind = 2            # mesh (level geometry)
priority = 15
source = "src/level.bin"

[[asset]]
id = 7
kind = 1            # texture (props atlas)
priority = 12
source = "src/props.bin"

[[asset]]
id = 8
kind = 4            # sound (ambient bank)
priority = 8
source = "src/ambient.bin"

[[asset]]
id = 9
kind = 3            # material (needs the level mesh + props texture)
priority = 25
source = "src/shader.bin"
dependencies = [6, 7]

[[asset]]
id = 10
kind = 5            # prefab (needs the ambient sound)
priority = 3
source = "src/prefab.bin"
dependencies = [8]
