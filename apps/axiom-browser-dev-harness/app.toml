# Axiom app manifest — axiom-browser-dev-harness.
#
# A developer harness that mounts the browser debug overlay + command console
# over a bare canvas. It is *app-side developer tooling*: the deterministic
# engine spine knows nothing about the DOM, keyboard events, CSS, or command
# text — all of that lives here, in an app, the only tier permitted to touch
# `web_sys` outside the platform-facing `host` layer / `windowing` module
# (Module Law #9).
#
# It composes NO engine module or layer: the overlay reports diagnostics about
# the engine surface through a replaceable *stub* provider, so the harness needs
# no engine dependency to exercise the overlay machinery. It names no layer and
# no module, and depends on no other app — apps are leaves in the dependency
# graph.

[app]
name = "browser-dev-harness"
crate_name = "axiom-browser-dev-harness"

allowed_layers = []

allowed_modules = []
