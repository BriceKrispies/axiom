# Axiom app manifest — axiom-browser-dev-harness.
#
# A thin developer harness that mounts the `debug-overlay` module's overlay +
# command console over a bare canvas and feeds it real browser-side diagnostics.
# All overlay logic lives in the module (its branchless, 100%-covered core + the
# wasm DOM arm); this app only composes it and supplies the measured values. It
# names no layer and depends on no other app — apps are leaves in the graph.

[app]
name = "browser-dev-harness"
crate_name = "axiom-browser-dev-harness"

allowed_layers = []

allowed_modules = [
    "debug-overlay",
]
