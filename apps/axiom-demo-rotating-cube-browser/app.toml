# Axiom app manifest — axiom-demo-rotating-cube-browser.
#
# The browser/WASM rotating-cube app, now pure scene description on the engine's
# App API. It composes a single module — the `axiom` umbrella (`engine`) — which
# internally pulls in the slice modules and the live windowing/wgpu backend
# (wasm32). The app names no layer directly: the authoring vocabulary
# (App/Window/Mesh/Material/Vec3/Transform/Ratio/Meters/...) all arrives through
# `axiom::prelude`. The wasm entry (`start`) calls `App::run`. It does NOT depend
# on the headless app — apps are leaves in the dependency graph.

[app]
name = "rotating-cube-browser-demo"
crate_name = "axiom-demo-rotating-cube-browser"

allowed_layers = []

allowed_modules = [
    "engine",
]
