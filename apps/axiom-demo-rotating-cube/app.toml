# Axiom app manifest — axiom-demo-rotating-cube.
#
# Apps are the only composition roots in the workspace. This app
# composes the four vertical-slice modules (scene, resources, render,
# webgpu) and provides the cross-module translation glue.

[app]
name = "rotating-cube-demo"
crate_name = "axiom-demo-rotating-cube"

allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "host",
    "frame",
    "introspect",
]

allowed_modules = [
    "scene",
    "resources",
    "render",
    "webgpu",
]
