# Semantic vertical-slice contract for the rotating-cube slice — the canonical
# named-contract chain (scene → resources → render → webgpu). This is a HEADLESS
# slice: its determinism is proven by committed golden byte artifacts at every
# boundary (tests/golden_artifacts.rs). It has no live pixel harness of its own
# (the gallery `rotating-cube` core, registered in axiom-shot, is the pixel path),
# so it declares no `harness` — only that its `harness_entry` core symbol exists.
#
# Each golden is pinned to a recorded SHA-256, so a deleted / regenerated /
# hand-edited golden is caught by `xtask check-slices` — closing the
# golden_artifacts.rs trust-on-first-use hole (a missing golden was silently
# re-captured; AXIOM_REGOLD silently rewrote). The CHECKER now owns the baseline.
[slice]
name = "rotating-cube-demo"
crate_name = "axiom-demo-rotating-cube"
harness_entry = "DemoRotatingCubeApi"
determinism_test = "golden_artifacts"

[[golden]]
path = "tests/golden/full_artifact_tick0.bin"
sha256 = "0c0d6fca172c75d0257207e6aacbf1761397b9ecbd345b8c69feb26bc13debfb"

