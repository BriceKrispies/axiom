[app]
name = "gallery"
crate_name = "axiom-gallery"

allowed_layers = [
    "kernel",
    "math",
    "interface",
    "host",
    "layout",
    "space",
    "entropy",
    "noise",
    "geosphere",
    "hydrology",
    "proc",
    "proc-validate",
    "runtime",
    "introspect",
]

allowed_modules = [
    "engine",
    "biome",
    "planetgen",
    "windowing",
    "debug-overlay",
    "input",
    "physics",
    "agent",
    "agent-harness",
    "perception",
    "streaming",
    "scatter",
    "world",
    "terrain-mesh",
    "gpu-backend",
    "canvas2d-backend",
    "animation",
    "figure",
]

# The cartridges (games/) this host loads. retro FPS was extracted out of this crate
# into `games/retro-fps`; the gallery composes it as a host.
allowed_games = [
    "retro-fps",
]
