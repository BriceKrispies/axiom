# Axiom app manifest — axiom-gallery.
#
# The single composition-leaf app that merges every browser/WASM demo. Each demo
# is a module under `src/<demo>/`; the gallery is a leaf in the dependency graph
# (nothing depends on it). `allowed_layers` / `allowed_modules` are the UNION of
# what the nine merged demos depend on — the app may compose layers and modules,
# never another app or tool.

[app]
name = "gallery"
crate_name = "axiom-gallery"

allowed_layers = [
    "kernel",
    "math",
    "interface",
    "host",
    "layout",
    "space",
    "entropy",
    "proc",
    "runtime",
    "introspect",
]

allowed_modules = [
    "engine",
    "windowing",
    "debug-overlay",
    "input",
    "physics",
    "agent",
    "agent-harness",
    "perception",
    "gpu-backend",
    "canvas2d-backend",
]
