# Semantic vertical-slice contract for the gallery's App-core render boundary.
#
# The gallery is ONE app crate hosting several renderable demos. Where the
# rotating-cube demo crate proves the records-only named-contract chain, the
# gallery slices are proven at the boundary they actually render through:
# `RunningApp::tick -> FrameOutcome` (the mesh-batch / camera-view-proj / light
# data the live GPU and Canvas2D backends consume). `tests/gallery_render_
# determinism.rs` pins that boundary for three registered slices (physics-
# crucible, rotating-cube, stress-cubes): each has a committed golden `.bin`, a
# replay-equal assertion, and a NEGATIVE (perturbed-differs) assertion — a
# diverged physics world for the crucible, a later animated tick for the cubes.
#
# `harness_entry` names one renderable App-core the gallery exposes; `harness`
# points at the gallery's axiom-shot registration (`--app rotating-cube`). Each
# golden is SHA-256-pinned, so a deleted / regenerated / hand-edited golden is
# caught by `xtask check-slices` (the checker owns the baseline, not the test's
# AXIOM_REGOLD capture path).
[slice]
name = "gallery"
crate_name = "axiom-gallery"
harness_entry = "rotating_cube_core"
determinism_test = "gallery_render_determinism"
harness = "rotating-cube"

[[golden]]
path = "tests/golden/physics_crucible_render.bin"
sha256 = "ffc67660557935309b8e95da9fb30cd5228c2ade5054f6011858389fea349b73"

