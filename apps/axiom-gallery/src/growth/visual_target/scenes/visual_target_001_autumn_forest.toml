# Axiom Visual Target 001 — a deterministic 64 m × 64 m sloped autumn forest patch.
#
# Everything here is explicit and versioned. The whole diorama is a pure function of
# this file: a camera, a directional sun, distance fog, a terrain mesh with ground
# colour/material variation, and instanced tree trunks + foliage (a handful authored
# by hand, the rest grown by a deterministic, seeded scatter). No procedural world
# generation, no gameplay — just data describing one expensive-looking screenshot.
#
# Coordinates: right-handed, +y up, metres. Colours are linear RGB in [0, 1].

version = 1
name = "visual-target-001-autumn-forest"

# Looking across the sloped patch from an elevated corner toward the middle.
[camera]
eye = [-26.0, 16.0, 40.0]
target = [4.0, 3.0, -4.0]
fov_deg = 50.0
near_m = 0.1
far_m = 400.0
width_px = 1280
height_px = 800

# Low, warm afternoon sun raking across the slope for long shadows.
[sun]
direction = [0.55, -0.5, -0.67]
color = [1.0, 0.9, 0.72]
intensity = 1.25

# Pale distance fog the far trees and ground fade into (also the clear colour).
[fog]
color = [0.74, 0.80, 0.86]
start_m = 28.0
end_m = 190.0

# A gently sloped 64 m square patch centred on the origin, with a few explicit
# value-noise octaves for undulation. Ground colour ramps by height; steep faces
# expose rock.
[terrain]
size_m = 64.0
spacing_m = 0.5
base_height_m = 0.0
slope = [0.06, 0.10]
detail = [
  { amplitude_m = 1.3, wavelength_m = 22.0, seed = 11 },
  { amplitude_m = 0.45, wavelength_m = 6.0, seed = 12 },
  { amplitude_m = 0.16, wavelength_m = 2.2, seed = 13 },
]
rock_albedo = [0.40, 0.38, 0.35]
rock_slope_start = 0.55
rock_slope_full = 1.10

# Ground albedo control points by height (blended between them).
[[terrain.ground_band]]
max_height_m = -4.0
albedo = [0.26, 0.22, 0.13]      # damp low soil
[[terrain.ground_band]]
max_height_m = 0.0
albedo = [0.40, 0.31, 0.16]      # leaf-litter loam
[[terrain.ground_band]]
max_height_m = 4.0
albedo = [0.52, 0.42, 0.22]      # dry autumn litter
[[terrain.ground_band]]
max_height_m = 9.0
albedo = [0.58, 0.50, 0.33]      # pale crest grass

# Two hand-placed hero trees near the middle-front of frame.
[[tree]]
x = 3.0
z = 2.0
yaw_deg = 20.0
trunk_height_m = 8.5
trunk_radius_m = 0.42
canopy_radius_m = 4.6
canopy_color = [0.86, 0.45, 0.13]    # deep orange

[[tree]]
x = -6.0
z = -2.0
yaw_deg = 200.0
trunk_height_m = 7.0
trunk_radius_m = 0.36
canopy_radius_m = 4.0
canopy_color = [0.90, 0.66, 0.20]    # golden

# The rest of the forest: a deterministic, seeded scatter over the patch. Same seed
# → same forest on every machine. These are the same data an author could have typed
# out as [[tree]] entries — just grown here so the file stays short.
[scatter]
seed = 7
count = 160
min_spacing_m = 1.8
slope_limit = 0.75
trunk_height_m = [4.0, 9.0]
trunk_radius_m = [0.16, 0.40]
canopy_radius_m = [2.0, 4.2]
canopy_palette = [
  [0.86, 0.42, 0.12],   # orange
  [0.90, 0.64, 0.18],   # gold
  [0.70, 0.28, 0.13],   # rust
  [0.62, 0.55, 0.22],   # olive
  [0.80, 0.35, 0.16],   # amber-red
]
