# prologue_postcard_001 — CANDIDATE, campaign-2 iteration 6 (attack: horizon_composition).
# One coherent bounded change: reshape the diorama from an elevated overview into an
# immersive forest INTERIOR like the reference — a low camera looking forward through
# TALL, THIN trunks over a deeper patch. All expressible in the manifest (no new
# capability): trunk height/radius, patch size, camera, density. This is the honest
# retry of the eye-level attempt that failed in iter2, now with trees built for it.

version = 1
name = "prologue-postcard-001-candidate-iter6"

# Low, forward-looking interior view: standing among the trunks, looking slightly up
# and into the depth of the forest.
[camera]
eye = [0.0, 2.6, 40.0]
target = [1.5, 8.0, -22.0]
fov_deg = 62.0
near_m = 0.1
far_m = 400.0
width_px = 1280
height_px = 800

[sun]
# ITER 10 (attack: contrast_and_exposure) — brighter, warmer, lower sun for tonal range.
# ITER 11 (attack: lighting_directionality) — backlight the scene (sun ahead + up,
# in view) so the new volumetric god-ray post-pass streams shafts toward the camera.
direction = [0.14, -0.40, 0.90]
color = [1.0, 0.86, 0.58]
intensity = 2.0

[fog]
# ITER 21 (attack: fog_and_haze) — a warm, luminous depth haze (matching the backlit
# sun) with a graduated falloff, so distance glows atmospherically instead of a flat
# cool wash — reads together with the god-ray shafts.
color = [0.90, 0.83, 0.71]
start_m = 16.0
end_m = 155.0

# A deeper patch so the trunks recede into the distance; gentler relief so the floor
# reads as walkable ground rather than lumpy hills at eye level.
[terrain]
# ITER 19 (attack: vegetation_density) — dense small patch, made composable by the
# keep-clear abstraction: no trunk spawns within 12 m of the camera.
size_m = 85.0
spacing_m = 0.6
base_height_m = 0.0
slope = [0.04, 0.06]
detail = [
  { amplitude_m = 1.4, wavelength_m = 34.0, seed = 11 },
  { amplitude_m = 0.5, wavelength_m = 9.0, seed = 12 },
  { amplitude_m = 0.18, wavelength_m = 2.4, seed = 13 },
  { amplitude_m = 0.07, wavelength_m = 0.9, seed = 14 },
]
rock_albedo = [0.40, 0.38, 0.35]
rock_slope_start = 0.55
rock_slope_full = 1.10

# ITER 15 (attack: foreground_material_detail) — the interior camera now shows the
# ground, so enrich it: warm autumn-litter albedo bands + a fine micro-relief octave
# give the visible foreground real material variation (the change iter1 could not show).
[[terrain.ground_band]]
max_height_m = -2.0
albedo = [0.26, 0.19, 0.11]
[[terrain.ground_band]]
max_height_m = 0.5
albedo = [0.46, 0.33, 0.17]
[[terrain.ground_band]]
max_height_m = 4.0
albedo = [0.60, 0.44, 0.22]
[[terrain.ground_band]]
max_height_m = 9.0
albedo = [0.68, 0.57, 0.34]

# Hero tree: tall and thin, set off to the side so it frames rather than blocks.
[[tree]]
x = -28.0
z = -34.0
yaw_deg = 20.0
trunk_height_m = 26.0
trunk_radius_m = 0.4
canopy_radius_m = 5.0
canopy_color = [0.90, 0.55, 0.15]

# Tall, thin trunks over the deeper patch — the beech-forest profile the reference has.
[scatter]
seed = 7
# ITER 8 (attack: vegetation_clumping) — relax the enforced even spacing so the
# random placement bunches into clumps and leaves clearings, instead of a uniform sprinkle.
# ITER 19 (attack: vegetation_density) — dense small patch made composable by the
# keep-clear abstraction: no trunk spawns within 16 m of the camera along the view.
count = 520
min_spacing_m = 1.3
slope_limit = 0.85
keep_clear_m = 16.0
# ITER 20 (attack: vegetation_clumping) — clustered placement: gather the trees into
# 14 clumps (radius 9 m) so believable groves and clearings replace the even sprinkle.
clusters = 14
cluster_radius_m = 9.0
# ITER 7 (attack: terrain_silhouette) — widen the height range so some emergent
# trees tower above the rest, breaking the flat canopy ceiling into a layered,
# varied skyline against the bright sky (the reference's broken-canopy read).
# ITER 13 (attack: terrain_silhouette) — taller emergents for a more dramatic,
# deeply layered canopy skyline against the sky.
trunk_height_m = [11.0, 42.0]
trunk_radius_m = [0.12, 0.40]
canopy_radius_m = [2.4, 5.4]
canopy_palette = [
  [0.92, 0.62, 0.16],
  [0.85, 0.42, 0.12],
  [0.78, 0.55, 0.18],
  [0.95, 0.72, 0.24],
  [0.70, 0.30, 0.12],
]

# Ground cover, expanded to carpet the larger patch densely.
[groundcover]
seed = 21
# ITER 12 (attack: artifact_level) — shrink the ground tufts into a finer, denser
# carpet so they read as ground texture instead of blocky little pyramids.
count = 16000
min_spacing_m = 0.22
slope_limit = 1.2
height_m = [0.12, 0.34]
radius_m = [0.07, 0.20]
palette = [
  [0.62, 0.50, 0.22],
  [0.70, 0.42, 0.16],
  [0.55, 0.48, 0.24],
  [0.48, 0.36, 0.18],
  [0.75, 0.60, 0.28],
]
