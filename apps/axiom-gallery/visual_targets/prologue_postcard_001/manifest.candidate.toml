# prologue_postcard_001 — the CHAMPION scene (iteration 0, the rough starting point).
#
# Deliberately rough so there is a real gap to converge: a dim, low-contrast sun; a
# sparse forest; a heavy near fog that flattens the depth planes; and a dull,
# desaturated palette. Each convergence iteration makes ONE bounded change to a copy
# of this file (manifest.candidate.toml) aimed at the single lowest-scoring axis.

version = 1
name = "prologue-postcard-001-champion-iter0"

[camera]
eye = [-26.0, 16.0, 40.0]
target = [4.0, 3.0, -4.0]
fov_deg = 50.0
near_m = 0.1
far_m = 400.0
width_px = 1280
height_px = 800

# Dim, nearly overhead sun: weak directionality, muddy contrast.
# ITER 2 (attack: lighting_directionality) — the one bounded change: swap the dim
# near-overhead sun for a low, warm, strong raking sun (clear direction + long shadows).
[sun]
direction = [0.55, -0.42, -0.72]
color = [1.0, 0.9, 0.72]
intensity = 1.3

# Heavy near fog that washes the whole slope into the sky — kills depth separation.
[fog]
color = [0.80, 0.82, 0.85]
start_m = 12.0
end_m = 110.0

[terrain]
size_m = 64.0
spacing_m = 0.5
base_height_m = 0.0
slope = [0.06, 0.10]
detail = [
  { amplitude_m = 0.6, wavelength_m = 22.0, seed = 11 },
]
rock_albedo = [0.40, 0.38, 0.35]
rock_slope_start = 0.55
rock_slope_full = 1.10

[[terrain.ground_band]]
max_height_m = 0.0
albedo = [0.34, 0.31, 0.26]
[[terrain.ground_band]]
max_height_m = 9.0
albedo = [0.40, 0.38, 0.32]

[[tree]]
x = 3.0
z = 2.0
yaw_deg = 20.0
trunk_height_m = 8.5
trunk_radius_m = 0.42
canopy_radius_m = 4.6
canopy_color = [0.55, 0.45, 0.30]

# ITER 1 (attack: vegetation_density) — the one bounded change: raise the forest
# from a sparse 30 to a full 150 and tighten spacing. Palette/lighting untouched.
[scatter]
seed = 7
count = 150
min_spacing_m = 1.7
slope_limit = 0.75
trunk_height_m = [4.0, 8.0]
trunk_radius_m = [0.16, 0.38]
canopy_radius_m = [2.0, 3.6]
canopy_palette = [
  [0.52, 0.44, 0.30],
  [0.48, 0.42, 0.28],
]

# ITER 3 (attack: foreground_material_detail) — the ABSTRACTION: a ground-cover
# instance layer (new [groundcover] primitive). The base diorama had no way to
# express ground-level detail; this scatters a dense carpet of small warm grass/
# litter tufts across the patch, giving the visible foreground real material detail.
[groundcover]
seed = 21
count = 4000
min_spacing_m = 0.35
slope_limit = 1.2
height_m = [0.2, 0.6]
radius_m = [0.15, 0.45]
palette = [
  [0.62, 0.50, 0.22],
  [0.70, 0.42, 0.16],
  [0.55, 0.48, 0.24],
  [0.48, 0.36, 0.18],
  [0.75, 0.60, 0.28],
]
