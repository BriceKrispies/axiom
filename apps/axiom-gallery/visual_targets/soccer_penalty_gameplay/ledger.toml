reason = """
Replaced the oval/blob (capsule/sphere) athletes with a rigid low-poly ANGULAR humanoid kit. \
New `penalty_character.rs` defines a 16-part parented humanoid (pelvis/torso/head/hair/arms/hands/\
thighs/shins/feet) with per-joint rotations, angular box meshes, and material slots (skin/hair/\
jersey/shorts/socks/shoes/gloves); the render path gained a `rotation` field (DioramaObject + \
PenaltyRenderContent::World + the meshed spawn) so posed limbs orient correctly, and `select_mesh` \
now routes every actor part to an angular box (ball stays a sphere). The kicker is a kit instance in \
a back-facing stride; the goalie's existing rig gained angular boxes + sock/shoe materials + a hair \
cap. kicker_silhouette 2->3, goalkeeper_silhouette 1->2; no non-attacked axis dropped, so promote. \
The goalie's arms-out/knees-bent stance was reverted: the Pass-6 save volumes ride the goalie joint \
world positions, so re-posing the idle changes deterministic save outcomes — a gameplay change out of \
scope for a visual pass (a render-only posed overlay decoupled from the collision rig is the correct \
future path). The kit uses proper JOINT pivots (each limb rotates about its shoulder/elbow/knee, not \
its center) so elbows/knees never bend backward, and the cube UVs were flipped to image convention so \
the jersey number + ad-board text read upright. App-only; no engine/kernel/runtime/math edits. \
Byte-deterministic (md5 77ba2c26…).
"""
