<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Soccer Penalty (retro 32-bit)</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        font: 14px/1.5 system-ui, sans-serif; background: #10141c; color: #d7dbe2;
      }
      #stage { position: fixed; inset: 0; }
      #axiom-soccer-penalty-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%; display: block;
        background: #10141c;
        /* Arrow/Space drive the game; don't let the browser scroll/zoom on them. */
        touch-action: none;
      }
      #hud {
        position: fixed; left: 0; right: 0; bottom: 0;
        display: flex; align-items: center; justify-content: center; gap: 14px;
        padding: 8px max(10px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        font: 12px ui-monospace, monospace; color: #9fd1ff; pointer-events: none;
        background: linear-gradient(to top, rgba(8,10,14,0.75), rgba(8,10,14,0));
      }
      #hud b { color: #ffe08a; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        color: #9aa3b2; font-size: 13px; background: #10141c; z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="axiom-soccer-penalty-canvas" width="960" height="600"></canvas>
    </div>
    <div id="hud">
      <span><b>Aim</b> ← ↑ ↓ → (or WASD)</span>
      <span><b>Shoot</b> hold + release SPACE</span>
      <span><b>Enter</b> next round</span>
      <span><b>R</b> reset</span>
    </div>
    <div id="boot">booting…</div>

    <script type="module">
      const v = Date.now();
      const wasm = await import(`../axiom-loader.js?v=${v}`);
      const boot = document.getElementById("boot");
      try {
        await wasm.default();
      } catch (e) {
        boot.textContent = "Startup failed: " + e;
        boot.style.color = "#e07a7a";
        throw e;
      }
      wasm.soccer_penalty_start();
      boot.style.display = "none";
    </script>
  </body>
</html>
