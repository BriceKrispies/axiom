# Axiom app manifest — axiom-game-runtime.
#
# The wasm-bindgen native boundary the TypeScript authoring SDK (@axiom/game)
# drives. It composes a single module — the `axiom` umbrella (`engine`) — which
# internally pulls in the slice modules, the fixed-step `frame` accumulator, and
# (on wasm32) the live windowing/wgpu backend. The app names no layer directly:
# the authoring vocabulary (App/RunningApp/FrameAccumulator/StepBudget/...) all
# arrives through `axiom::prelude`. The deterministic stepping core is the rlib,
# native slice-tested; the wasm `start`/`WasmGame` entry is the boundary the SDK
# binds. It is a leaf in the dependency graph — nothing depends on it.

[app]
name = "game-runtime"
crate_name = "axiom-game-runtime"

# The RNG seam marshals the real entropy facade keyed at the root address, so the
# app composes the `entropy` and `space` layers directly (the umbrella does not
# pull them in). Everything else still arrives through `axiom::prelude`.
allowed_layers = [
    "entropy",
    "space",
    # Physics (SPEC-10) steps over an explicit `RuntimeStep` (runtime layer) whose
    # `FrameIndex`/`Tick` identities come from the kernel layer; both are layers
    # the umbrella does not re-export, so this leaf app names them directly.
    "runtime",
    "kernel",
    # Math (SPEC-03 / SPEC-11): the single deterministic math source of truth the
    # `v3`/`mat4`/`quat`/`clamp`/`normalizeAngle` host ops forward to. The prelude
    # re-exports the value types but not the `MathApi` facade or `Quat`, so this
    # leaf app names the `math` layer directly.
    "math",
    # UI (SPEC-09): the immediate-mode `axiom-interface` HUD surface the `ui*` verbs
    # bind over, and the responsive `axiom-layout` flex solver `uiSolveLayout` uses.
    "interface",
    "layout",
    # Host: the `axiom-draw2d` value vocabulary (Rect/Fill2d/Common2d/Rgba/
    # RenderTargetId) the `draw2d*` verbs marshal, plus the Pixels/HostViewport the
    # layout solver takes.
    "host",
]

allowed_modules = [
    "engine",
    # The deterministic rigid-body physics world (SPEC-10) the bridge composes.
    "physics",
    # The per-tick intent-snapshot facade (SPEC-05) the bridge samples each tick.
    "input",
    # Timers + state machines (SPEC-07): the deterministic tick wheel the bridge
    # pumps once per fixed tick.
    "tick",
    # Tick-sampled tweens (SPEC-09): the eased-curve table the bridge samples.
    "tween",
    # Grid / pathfinding (SPEC-06): the deterministic BFS/wavefront core the
    # `gridPath`/`gridReachable`/`gridDistanceField`/`gridStepToward` host ops use.
    "grid",
    # Audio (SPEC-08): the neutral mixer core the `playSound`/`playTone`/… host ops
    # drive; the live Web Audio output is the app's `wasm32` arm.
    "audio",
    # 2D drawing (SPEC-10): the `axiom-draw2d` builder (particles / render targets /
    # shapes) the `draw2d*` verbs forward to.
    "draw2d",
    # 3D presentation (SPEC-11): the `axiom-windowing` live backend the wasm
    # `bindSurface` / `renderScene` boundary binds to the canvas to present the
    # authored 3D scene. wasm32-only arm; the deterministic core is native-tested.
    "windowing",
]
