<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axiom @axiom/game — hot-reload dev harness</title>
    <style>
      html, body {
        margin: 0; min-height: 100vh; background: #07090e; color: #8aa0c0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      #c { background: #07090e; border: 1px solid #1c2230; border-radius: 6px; max-width: 96vw; }
      #hud { display: flex; gap: 16px; justify-content: space-between; width: 960px; max-width: 96vw; }
      #hud b { color: #d8e6ff; font-weight: 600; }
      #status { transition: color .2s; }
      .flash { color: #7CFFB2 !important; }
    </style>

    <!--
      No bundler: the browser loads the @axiom/game SDK as native ES modules out of
      its dist/ build, resolved by this import map. The author game + harness are
      emitted under /dist by the dev server's tsgo compile. The boot edge module is
      deep-imported by absolute path in the harness (the host page is its consumer).
    -->
    <script type="importmap">
      { "imports": { "@axiom/game": "/vendor/axiom-game/index.js" } }
    </script>
  </head>
  <body>
    <canvas id="c" width="960" height="540"></canvas>
    <div id="hud">
      <span id="status">booting…</span>
      <span>edit <b>apps/axiom-game-runtime/web/src/game.ts</b> and save — the browser re-runs live</span>
    </div>
    <script type="module" src="/dist/harness.js"></script>
  </body>
</html>
