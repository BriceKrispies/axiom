<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axiom @axiom/game — hot-reload dev harness</title>
    <style>
      html, body {
        margin: 0; min-height: 100vh; background: #07090e; color: #8aa0c0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      #c { background: #07090e; border: 1px solid #1c2230; border-radius: 6px; max-width: 96vw; }
      #hud { display: flex; gap: 16px; justify-content: space-between; width: 960px; max-width: 96vw; }
      #hud b { color: #d8e6ff; font-weight: 600; }
      #status { transition: color .2s; }
      .flash { color: #7CFFB2 !important; }
    </style>

    <!--
      Vite dev: the harness is a native ES module Vite transforms + serves with an
      HMR client injected. `@axiom/game` resolves to the workspace SDK (a Vite alias),
      and `./game.ts` edits arrive over `import.meta.hot.accept` — the running engine
      is patched in place, never recreated. See web/vite.config.ts.
    -->
  </head>
  <body>
    <canvas id="c" width="960" height="540"></canvas>
    <div id="hud">
      <span id="status">booting…</span>
      <span>edit <b>apps/axiom-game-runtime/web/src/game.ts</b> and save — the engine hot-patches live</span>
    </div>
    <script type="module" src="/src/harness.ts"></script>
  </body>
</html>
