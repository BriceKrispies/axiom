[app]
name = "generia"
crate_name = "axiom-generia"

# The browser-free diorama core uses the kernel (dimensioned scalars +
# StableHash), math, the neutral host frame/backend contracts, and the
# entropy/space substrate that keys the deterministic scatter. The wasm32 shell
# adds coherent value noise for the sward.
allowed_layers = ["kernel", "math", "host", "entropy", "space", "noise"]

# terrain-mesh meshes the streamed ground window (native + wasm). The wasm32
# shell adds the streaming/world residency ring, the scatter placer, the
# first-person controller, the agent harness (the ?agent=1 benchmark walk), the
# live windowing presentation loop, and the shared backquote debug overlay.
allowed_modules = [
    "terrain-mesh",
    "world",
    "streaming",
    "scatter",
    "fp-controller",
    "agent-harness",
    "windowing",
    "debug-overlay",
]
