<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axiom — Generia</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 24px;
        font: 14px/1.5 system-ui, sans-serif;
        background: #15171c;
        color: #d7dbe2;
      }
      h1 { font-size: 18px; font-weight: 650; margin: 0; }
      p.hint { margin: 0; color: #aab2c0; }
      p.hint kbd {
        background: #2a2e36; border: 1px solid #353a45; border-radius: 4px;
        padding: 1px 6px; font: 12px ui-monospace, monospace; color: #e6e9ef;
      }
      #axiom-generia-canvas {
        width: 1280px; height: 800px; max-width: 100%; aspect-ratio: 16 / 10;
        border: 1px solid #2a2e36; border-radius: 6px; background: #000; cursor: crosshair;
      }
      #status { font: 12px ui-monospace, monospace; color: #9fd1ff; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>Axiom — Generia</h1>
    <p class="hint">
      <strong>Click the canvas</strong> to capture the mouse, then look with the mouse and move with
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> (or the <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> arrows).
      <kbd>Esc</kbd> releases the mouse. Walk the Axiom-rendered forest of <em>Generia</em>.
    </p>
    <canvas id="axiom-generia-canvas" width="1280" height="800"></canvas>
    <p id="status">loading…</p>

    <script type="module">
      const status = document.getElementById("status");
      const set = (m) => { status.textContent = m; };
      try {
        // Cache-bust this app's own bundle glue on every load.
        const v = Date.now();
        const wasm = await import(`./pkg/axiom_generia.js?v=${v}`);
        // Plain init(): the glue resolves its own co-located `_bg.wasm` itself.
        await wasm.default();
        wasm.generia_start();
        wasm.overlay_start();
        set("running — click the canvas to walk.");
      } catch (e) {
        set("failed to start: " + e);
        throw e;
      }
    </script>
  </body>
</html>
