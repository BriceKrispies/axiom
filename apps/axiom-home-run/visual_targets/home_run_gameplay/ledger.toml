reason = "Bottom-frame ownership: the brown home-plate deck widened to span the whole foreground (46u) with pale walkway seams framing the plate, matching the reference's deck. Determinism verified: two captures of the same frozen-tick URL are byte-identical (md5 E43C48545A4A5B2BD0A233283E722C9D). Campaign paused for review — no structural mismatch the engine can express remains unaddressed at proxy fidelity; residual gaps are the canvas2d fixed grade (GPU backend verified separately) and modeled-vs-boxy figures."
