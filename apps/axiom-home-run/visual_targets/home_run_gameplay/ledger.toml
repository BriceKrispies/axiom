reason = "batter_silhouette 1->2: wide side-on stance (feet along the pitch line), deeper torso, bigger helmet, and a thicker emissive-yellow bat that reads at rest and through the swing. Rendered together with iteration 5 (one rebuild, two independent axes — noted for honesty)."
