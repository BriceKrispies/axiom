<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Minimal 3v3 Basketball</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; gap: 10px;
        padding:
          max(14px, env(safe-area-inset-top))
          max(14px, env(safe-area-inset-right))
          max(14px, env(safe-area-inset-bottom))
          max(14px, env(safe-area-inset-left));
        font: 14px/1.5 system-ui, sans-serif; background: #0a0b12; color: #d7dbe2;
      }
      h1 { font-size: 15px; font-weight: 800; margin: 0; letter-spacing: 2px; }
      h1 span { color: #4d9dff; }

      #stage { position: relative; line-height: 0; max-width: 100%; }
      #axiom-canvas {
        width: 760px; height: auto; aspect-ratio: 760 / 600; max-width: 100%;
        border: 1px solid #23262f; border-radius: 10px; background: #05060a;
        touch-action: none;
      }

      /* Big center result banner (BUCKET! / MISS / STOLEN / INTERCEPTED). */
      #result {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font: 800 54px/1 ui-monospace, monospace; letter-spacing: 4px; pointer-events: none;
        opacity: 0; transition: opacity 0.08s; text-shadow: 0 3px 0 #000, 0 0 22px rgba(0, 0, 0, 0.9);
      }
      #result.show { opacity: 1; }
      #result[data-kind="made"] { color: #7fffa8; }
      #result[data-kind="miss"] { color: #ffb14d; }
      #result[data-kind="stolen"], #result[data-kind="intercepted"] { color: #ff6a6a; }

      /* Release-timing tag (EARLY / GOOD / PERFECT / LATE), lower center. */
      #timing {
        position: absolute; left: 50%; bottom: 12%; transform: translateX(-50%);
        font: 800 22px/1 ui-monospace, monospace; letter-spacing: 3px; pointer-events: none;
        opacity: 0; transition: opacity 0.08s; text-shadow: 0 2px 0 #000;
      }
      #timing.show { opacity: 1; }
      #timing[data-tag="perfect"] { color: #ffe25a; text-shadow: 0 2px 0 #000, 0 0 16px #ffd23d; }
      #timing[data-tag="good"] { color: #7fffa8; }
      #timing[data-tag="early"], #timing[data-tag="late"] { color: #ffb14d; }

      /* Possession line, top center over the court. */
      #possession {
        position: absolute; left: 50%; top: 10px; transform: translateX(-50%);
        font: 700 12px/1 ui-monospace, monospace; letter-spacing: 2px; color: #9aa0ad;
        pointer-events: none; text-shadow: 0 1px 0 #000;
      }

      #hud {
        display: flex; gap: 24px; width: 760px; max-width: 100%;
        font-family: ui-monospace, monospace; justify-content: center; align-items: center;
      }
      #score { color: #ffd08a; font-weight: 700; font-size: 16px; letter-spacing: 1px; }
      #controls { color: #4d9dff; font-weight: 700; font-size: 13px; }
    </style>

    <!-- The @axiom/game SDK loads as native ES modules via the import map below. -->
    <script type="importmap">
      { "imports": { "@axiom/game": "/vendor/axiom-game/index.js" } }
    </script>
  </head>
  <body>
    <h1>Axiom — <span>Minimal 3v3 Basketball</span></h1>
    <div id="stage">
      <canvas id="axiom-canvas" width="760" height="600"></canvas>
      <div id="possession">YOU HAVE THE BALL</div>
      <div id="result"></div>
      <div id="timing"></div>
    </div>
    <div id="hud">
      <span id="score">MAKES 0 / 0</span>
    </div>
    <div id="controls">WASD move · Q/E pass · hold SPACE to jump, release at the apex to shoot · R reset</div>

    <script type="module" src="/dist/harness.js"></script>
  </body>
</html>
