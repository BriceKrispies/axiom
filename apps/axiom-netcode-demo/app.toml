# Axiom app manifest — axiom-netcode-demo.
#
# A headless determinism demo: it drives the real engine `App` (from the `axiom`
# umbrella) through the `netcode` deterministic-lockstep session and proves two
# independent engine instances produce byte-identical state at every confirmed
# tick. It composes exactly two modules — `engine` (the umbrella) and `netcode`
# — and owns the translation glue between them (a `FrameOutcome` into the bytes
# netcode hashes), which is an app's job. No sockets, no browser; the proof is
# entirely in-process and native.

[app]
name = "netcode-demo"
crate_name = "axiom-netcode-demo"

allowed_layers = [
    "crypto",
]

allowed_modules = [
    "engine",
    "netcode",
]
