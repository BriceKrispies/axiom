# Axiom app manifest — axiom-netplay-browser.
#
# The live SERVER-AUTHORITATIVE multiplayer demo. Two browsers each control a
# cube; the authoritative server (tools/axiom-netplay-server) owns the state and
# the browsers render its snapshots. The networking + protocol + keyboard live in
# the page's JavaScript via the TypeScript @axiom/client SDK; this crate is the
# renderer. It composes two modules — `engine` (the umbrella `App` with player
# nodes) and `windowing` (the live presentation loop, wasm32 only) — and owns the
# translation glue (applying pushed authoritative positions to the scene). It
# depends on no layer directly (both deps are modules).

[app]
name = "netplay-browser"
crate_name = "axiom-netplay-browser"

allowed_layers = []

allowed_modules = [
    "engine",
    "windowing",
]
