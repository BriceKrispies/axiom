# Semantic vertical-slice contract for the physics crucible's App-core render
# boundary (carved out of the merged gallery's slice.toml in the de-merge).
#
# The slice is proven at the boundary it actually renders through:
# `RunningApp::tick -> FrameOutcome` (the mesh-batch / camera-view-proj / light
# data the live GPU and Canvas2D backends consume). `tests/render_determinism.rs`
# pins that boundary with a committed golden `.bin`, a replay-equal assertion,
# and a NEGATIVE (perturbed-differs) assertion — a diverged physics world.
#
# `harness_entry` names the renderable App-core this crate exposes
# (`build_physics_crucible`, the pre-simulated hero frame); `harness` points at
# the axiom-shot registration (`--app physics-crucible`). The golden is
# SHA-256-pinned, so a deleted / regenerated / hand-edited golden is caught by
# `xtask check-slices` (the checker owns the baseline, not the test's
# AXIOM_REGOLD capture path).
[slice]
name = "physics-crucible"
crate_name = "axiom-physics-crucible"
harness_entry = "build_physics_crucible"
determinism_test = "render_determinism"
harness = "physics-crucible"

[[golden]]
path = "tests/golden/physics_crucible_render.bin"
sha256 = "ffc67660557935309b8e95da9fb30cd5228c2ade5054f6011858389fea349b73"
