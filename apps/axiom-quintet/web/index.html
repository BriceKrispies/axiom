<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Quintet</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        font: 14px/1.5 system-ui, sans-serif; background: #15171c; color: #d7dbe2;
      }
      /* The full-viewport stage: the ENGINE places the board grid and the piece
         tray within the canvas (axiom-layout's solver, driven each frame from the
         live window size + orientation + safe-area). In portrait the tray stacks
         below a larger board; in landscape they sit side by side. */
      #stage { position: fixed; inset: 0; }
      #axiom-quintet-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%; display: block;
        background: #15171c; cursor: grab;
        /* Drags drive the game, so the browser must not treat them as scroll/zoom. */
        touch-action: none;
      }
      #axiom-quintet-canvas:active { cursor: grabbing; }
      /* Compact HUD across the top: status (left) + reset (right), clearing the
         safe area. The layout reserves the top strip so the board sits below it. */
      #hud {
        position: fixed; top: 0; left: 0; right: 0;
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding:
          max(6px, env(safe-area-inset-top))
          max(10px, env(safe-area-inset-right))
          6px
          max(10px, env(safe-area-inset-left));
        pointer-events: none;
      }
      #status {
        flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font: 12px ui-monospace, monospace; color: #9fd1ff;
      }
      #btn-undo, #btn-reset {
        pointer-events: auto; flex: none;
        color: #fff; border: 0; border-radius: 7px;
        padding: 7px 12px; font: 600 12px system-ui; cursor: pointer;
      }
      #btn-reset { background: #2f6df0; }
      #btn-reset:hover { background: #3b79ff; }
      #btn-undo { background: #444b58; }
      #btn-undo:hover { background: #545c6c; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        color: #9aa3b2; font-size: 13px; background: #15171c; z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="axiom-quintet-canvas" width="640" height="488"></canvas>
    </div>
    <div id="hud">
      <span id="status">Press the board to place the quintet (or drag it from the tray).</span>
      <button id="btn-undo">↶ Undo</button>
      <button id="btn-reset">↺ Reset</button>
    </div>
    <div id="boot">booting…</div>

    <script type="module">
      const v = Date.now();
      const wasm = await import(`./pkg/axiom_quintet.js?v=${v}`);
      const boot = document.getElementById("boot");
      try {
        await wasm.default();
      } catch (e) {
        boot.textContent = "Startup failed: " + e;
        boot.style.color = "#e07a7a";
        throw e;
      }
      wasm.quintet_start();
      wasm.overlay_start();
      boot.style.display = "none";

      document.getElementById("btn-undo").addEventListener("click", () => wasm.quintet_undo());
      document.getElementById("btn-reset").addEventListener("click", () => wasm.quintet_reset());
    </script>
  </body>
</html>
