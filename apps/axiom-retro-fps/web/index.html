<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axiom — retro FPS (first-person)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; color: #d8f6ec;
                 font-family: ui-monospace, Menlo, Consolas, monospace; }
    main { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
    canvas { width: min(92vw, 960px); aspect-ratio: 8 / 5; background: #000;
             border: 1px solid #223; touch-action: none; }
    /* On-screen keypad (D-pad) — the gallery shell's keypad styles, inlined. */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      grid-template-areas:
        ".    up    ."
        "left fire  right"
        ".    down  .";
      gap: 8px;
      justify-content: center;
      user-select: none;
    }
    .keypad .pad {
      width: 64px;
      height: 64px;
      font-size: 24px;
      color: #d8f6ec;
      background: #151a21;
      border: 1px solid #2a2e36;
      border-radius: 12px;
      touch-action: none;
    }
    .keypad .pad.active {
      background: #7ee2b8;
      color: #10130f;
      border-color: #7ee2b8;
    }
    .pad-up { grid-area: up; }
    .pad-down { grid-area: down; }
    .pad-left { grid-area: left; }
    .pad-right { grid-area: right; }
    .pad-fire {
      grid-area: fire;
      font-size: 12px;
      font-weight: 700;
      color: #f0d9d9;
      background: #5a2330;
      border-color: #7a3340;
    }
    .pad-fire.active {
      background: #e07a7a;
      color: #2a0d10;
      border-color: #e07a7a;
    }
  </style>
</head>
<body>
<main>
  <h1>retro FPS (first-person)</h1>
  <canvas id="axiom-retro-fps-canvas"></canvas>
  <div id="keypad"></div>
</main>
<script type="module">
  import init, { retro_fps_start, overlay_start } from "./pkg/axiom_retro_fps.js";
  import { renderKeypad } from "./keypad.js";
  await init();
  retro_fps_start();
  overlay_start();
  // Touch controls (the demo also owns desktop pointer lock itself: click the
  // canvas to capture the mouse, WASD to move, click to fire, Esc to release).
  renderKeypad(document.getElementById("keypad"), [
    { key: "ArrowUp", label: "▲", pos: "up" },
    { key: "ArrowLeft", label: "◀", pos: "left" },
    { key: "ArrowRight", label: "▶", pos: "right" },
    { key: "ArrowDown", label: "▼", pos: "down" },
    { key: " ", label: "FIRE", pos: "fire" },
  ]);
</script>
</body>
</html>
