[package]
name = "axiom-roomed-puzzle"
description = "Roomed Puzzle: a deterministic top-down 2D grid puzzle built as an Axiom app. A solid player walks a 10x10 room; pressing q freezes the current life into a ghost that replays the recorded path on a fixed-step cadence, so ghosts can hold buttons that open doors for the live player. The deterministic game core is pure Rust on the kernel's fixed-step time primitives; the in-browser editor/playtest surface is the wasm-only `web` arm (a 2D canvas, the sanctioned axiom-growth pattern). Apps are composition leaves, exempt from the branchless and 100%-coverage spine gates."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

# `cdylib` for the wasm browser editor/playtest surface (the `web` module's
# `#[wasm_bindgen]` entries); `rlib` so the native test suite still builds and
# exercises the deterministic game core.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The one engine layer this app genuinely builds on: the kernel's deterministic
# fixed-step time primitives (`FixedStep`, `Tick`, `SimulationClock`) are the
# clock that paces ghost replay â€” the game core never reads a wall clock. Listed
# in app.toml's `allowed_layers`.
axiom-kernel = { path = "../../crates/axiom-kernel" }

# The interface layer's keybinding primitive (Keymap/KeyBinding +
# InterfaceInputEvent). `command_for_key` resolves keys through a shared Keymap.
# Used natively (the mapping is browser-free and unit-tested), so it is a normal
# dependency. Listed in app.toml's `allowed_layers`.
axiom-interface = { path = "../../crates/axiom-interface" }

# The engine input module: its per-tick `InputState` facade quantizes a touch
# gesture to a cardinal `SwipeDir`. `command_for_swipe` maps that `SwipeDir` to a
# move and is browser-free + unit-tested natively, so the (pure, kernel+math)
# module is a normal dependency. The wasm `web` arm additionally feeds it the live
# pointer samples. Listed in app.toml's `allowed_modules`.
axiom-input = { path = "../../modules/axiom-input" }

# Standard, hand-editable level format. `toml` + `serde` are already the repo's
# manifest-parsing stack (see crates/xtask); we reuse the same versions. Used by
# the level codec in both native tests and the wasm editor, so they are normal
# (not wasm-gated) dependencies.
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Browser entry only: the wasm-bindgen glue, a panic hook, and the DOM/2D-canvas
# the editor/playtest surface binds to. Confined to wasm32, so native
# `cargo test --workspace` never compiles them and the deterministic core stays
# browser-free.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
# The math layer, for `Vec2` â€” the canvas surface size and the neutral pointer
# samples the `web` arm feeds into the input module's `DeviceFrame`. Only the wasm
# arm builds these vectors now (the native swipeâ†’move mapping reads a `SwipeDir`),
# so it is wasm-gated. Listed in app.toml's `allowed_layers`.
axiom-math = { path = "../../crates/axiom-math" }
# The engine's responsive layout solver + the host viewport facts it consumes.
# The `web` arm builds a HostViewport from the live window/DPR/safe-area, declares
# a board+panel tree, and applies the solved rects to the DOM â€” so placement is the
# engine's decision, mobile-first, not per-app CSS. Listed in app.toml's
# `allowed_layers`.
axiom-host = { path = "../../crates/axiom-host" }
axiom-layout = { path = "../../crates/axiom-layout" }
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "Node",
    "HtmlElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "CssStyleDeclaration",
    "DomRect",
    "KeyboardEvent",
    "MouseEvent",
    "PointerEvent",
    "console",
] }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
