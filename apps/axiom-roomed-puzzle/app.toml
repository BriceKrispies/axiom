# Axiom app manifest — axiom-roomed-puzzle.
#
# A deterministic top-down 2D grid puzzle (the "roomed puzzle" with ghost
# replay). It is built as an app — a composition leaf — on purpose: apps are
# exempt from the branchless and 100%-coverage spine gates, so the gameplay
# rules, level format, editor, and ghost-replay model live here.
#
# It depends on exactly ONE engine layer, the kernel, and genuinely so: the
# kernel's deterministic fixed-step time primitives (`FixedStep`, `Tick`,
# `SimulationClock`) are the clock that paces ghost replay (one recorded move per
# 0.5 s == 30 ticks at the app's 60 Hz fixed step). The game core never reads a
# wall clock.
#
# It depends on NO module. The game is a top-down 2D grid: it renders itself on a
# 2D `<canvas>` in its wasm-only `web` arm (the same app-local presentation
# pattern axiom-growth's overworld map uses), not through the engine's 3D
# instanced-cube render path — which cannot express an interactive grid editor,
# translucent ghosts, or recessed open doors. Declaring the `engine`/`windowing`
# modules here would be a ceremonial dependency, so they are omitted. See
# ARCHITECTURE.md for the full rationale.

[app]
name = "roomed-puzzle"
crate_name = "axiom-roomed-puzzle"

allowed_layers = [
    "kernel",
    "math",
    "host",
    "layout",
]

# The mobile-first touch input synthesizer. The wasm `web` arm feeds it neutral
# pointer samples and maps a completed swipe to a one-cell move, so the puzzle is
# playable by touch (not only keyboard). Composed by the app, not the spine.
allowed_modules = [
    "input",
]
