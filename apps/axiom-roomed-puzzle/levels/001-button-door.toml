# Roomed Puzzle — Level 001: "Button Door"
#
# A 10x10 room. A wall partition at column x=7 seals off the exit corridor
# (column x=8); the door at (7,5) is the ONLY gap in that partition, so the exit
# genuinely cannot be reached without opening the door. The button at (4,5) opens
# it — but the button is far from the door, so a single live player cannot hold
# the button and walk through at once. The intended solution:
#
#   1. Walk the player from the entrance (1,5) to the button (4,5).
#   2. Press `q` — the recorded path becomes a ghost that replays it.
#   3. The ghost walks back onto the button and holds it (door opens).
#   4. Walk the (reset) live player through the open door to the exit (8,5).
#
# ASCII map (x to the right, y downward; #=wall .=floor P=start B=button
# D=door E=exit):
#
#   # # # # # # # # # #
#   # . . . . . . # . #
#   # . . . . . . # . #
#   # . . . . . . # . #
#   # . . . . . . # . #
#   # P . . B . . D E #
#   # . . . . . . # . #
#   # . . . . . . # . #
#   # . . . . . . # . #
#   # # # # # # # # # #

title = "Button Door"
width = 10
height = 10

[player]
start = [1, 5]

[exit]
position = [8, 5]

