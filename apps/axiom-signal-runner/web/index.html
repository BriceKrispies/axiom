<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Signal Runner</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px;
        padding:
          max(12px, env(safe-area-inset-top))
          max(12px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom))
          max(12px, env(safe-area-inset-left));
        font: 13px/1.5 system-ui, sans-serif; background: #d9dbe4; color: #3a3d46;
      }
      h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 1px; opacity: 0.7; }
      /* The canvas id MUST match `surface`/`canvasId` the boot passes. */
      #c {
        width: 1200px; height: 800px; max-width: 100%; aspect-ratio: 3 / 2;
        border: 1px solid #b9bcc8; border-radius: 8px; background: #e9eaf1;
        touch-action: none; cursor: crosshair; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      }
      p { margin: 0; opacity: 0.6; }
    </style>

    <!-- The @axiom/game SDK loads as native ES modules via this import map. -->
    <script type="importmap">
      { "imports": { "@axiom/game": "/vendor/axiom-game/index.js" } }
    </script>
  </head>
  <body>
    <h1>AXIOM — SIGNAL RUNNER</h1>
    <canvas id="c" width="1200" height="800"></canvas>
    <p>A/D or ←/→ steer · SHIFT brake · SPACE/1 boost · 2 shield · 3 pulse · 4 drone · drag to steer · ENTER activate/restart</p>
    <script type="module" src="/dist/harness.js"></script>
  </body>
</html>
