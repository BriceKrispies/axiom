# Axiom app manifest — axiom-sim-crucible (Simulation Crucible proof app).
#
# The crucible is a headless composition leaf: it proves the ECS + sim-core
# substrate can express a Dwarf-Fortress-like emergent causal chain using only
# generic systems and data definitions. It depends on the ECS layer and the
# sim-core module through their public surfaces. Nothing depends on this app.

[app]
name = "sim-crucible"
crate_name = "axiom-sim-crucible"

allowed_layers = [
    "ecs",
]

allowed_modules = [
    "sim-core",
]
