<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Soccer Penalty (retro 32-bit)</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; gap: 12px;
        padding:
          max(16px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        font: 14px/1.5 system-ui, sans-serif; background: #0c0d10; color: #d7dbe2;
      }
      h1 { font-size: 15px; font-weight: 600; margin: 0; }
      /* The canvas id MUST match the id the harness passes to boot()/bindSurface. */
      #axiom-canvas {
        width: 960px; height: 600px; max-width: 100%;
        border: 1px solid #2a2e36; border-radius: 6px; background: #000;
        touch-action: none; cursor: crosshair;
      }
      #stage { position: relative; line-height: 0; max-width: 100%; }
      /* The aim reticle, positioned over the goal by the HUD model. */
      #reticle {
        position: absolute; width: 34px; height: 34px; margin: -17px 0 0 -17px;
        border: 2px solid #ffe25a; border-radius: 50%; box-shadow: 0 0 6px #000;
        pointer-events: none; opacity: 0.9;
      }
      #reticle::after {
        content: ""; position: absolute; left: 50%; top: 50%; width: 4px; height: 4px;
        margin: -2px 0 0 -2px; background: #ffe25a; border-radius: 50%;
      }
      /* The result / session banner overlay, centred on the stage. */
      #banner {
        position: absolute; left: 50%; top: 34%; transform: translate(-50%, -50%);
        font: 800 46px/1 ui-monospace, monospace; letter-spacing: 2px; color: #fff;
        text-shadow: 0 3px 0 #000, 0 0 14px rgba(0,0,0,0.8); pointer-events: none;
        opacity: 0; transition: opacity .12s; text-align: center;
      }
      #banner small { display: block; font-size: 18px; letter-spacing: 1px; color: #ffe25a; margin-top: 6px; }
      #banner.show { opacity: 1; }
      #hud {
        display: flex; gap: 22px; width: 960px; max-width: 100%;
        font-family: ui-monospace, monospace; justify-content: center; align-items: center;
      }
      #hud b { color: #d8e6ff; font-weight: 600; }
      #power-wrap { width: 140px; height: 12px; border: 1px solid #3a3f49; border-radius: 6px; overflow: hidden; background: #16181d; }
      #power-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#3fd17f,#ffe25a,#e07a7a); transition: width .05s; }
      #instruction { color: #ffe25a; font-weight: 700; min-width: 84px; text-align: center; }
      #prompt { color: #7fd17f; font-weight: 700; }

      /* On-screen touch controls: an aim joystick, a SHOOT button, a RESET button. */
      #controls {
        display: flex; align-items: center; justify-content: space-between;
        width: 960px; max-width: 100%; gap: 24px; margin-top: 2px;
        touch-action: none; user-select: none; -webkit-user-select: none;
      }
      #joystick {
        position: relative; flex: none; width: 120px; height: 120px; border-radius: 50%;
        background: radial-gradient(circle at 50% 38%, #23262e, #131519);
        border: 1px solid #333844; box-shadow: inset 0 2px 10px rgba(0,0,0,0.65);
        touch-action: none; cursor: grab;
      }
      #joystick-knob {
        position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
        margin: -26px 0 0 -26px; border-radius: 50%; pointer-events: none;
        background: radial-gradient(circle at 50% 34%, #626c7b, #333a45);
        border: 1px solid #6b7686; box-shadow: 0 2px 6px rgba(0,0,0,0.6);
        transform: translate(0px, 0px);
      }
      #buttons { display: flex; align-items: center; gap: 18px; }
      #shoot-btn, #reset-btn {
        border: none; border-radius: 50%; color: #0c0d10; font: 700 14px/1 ui-monospace, monospace;
        letter-spacing: 1px; touch-action: none; cursor: pointer;
        -webkit-tap-highlight-color: transparent; transition: transform .05s, box-shadow .05s;
      }
      #shoot-btn {
        width: 94px; height: 94px; background: radial-gradient(circle at 50% 34%, #ffe98a, #ffcf3f);
        box-shadow: 0 4px 0 #b8921f, 0 5px 12px rgba(0,0,0,0.5);
      }
      #reset-btn {
        width: 66px; height: 66px; color: #fff; background: radial-gradient(circle at 50% 34%, #e79aa0, #d05f68);
        box-shadow: 0 4px 0 #8f2f37, 0 5px 12px rgba(0,0,0,0.5);
      }
      #shoot-btn:active, #reset-btn:active { transform: translateY(3px); }
      #shoot-btn:active { box-shadow: 0 1px 0 #b8921f, 0 2px 6px rgba(0,0,0,0.5); }
      #reset-btn:active { box-shadow: 0 1px 0 #8f2f37, 0 2px 6px rgba(0,0,0,0.5); }
    </style>

    <!-- The @axiom/game SDK loads as native ES modules via the import map below. -->
    <script type="importmap">
      { "imports": { "@axiom/game": "/vendor/axiom-game/index.js" } }
    </script>
  </head>
  <body>
    <h1>Axiom — Soccer Penalty (retro 32-bit)</h1>
    <div id="stage">
      <canvas id="axiom-canvas" width="960" height="600"></canvas>
      <div id="reticle"></div>
      <div id="banner"><span id="banner-text"></span><small id="banner-sub"></small></div>
    </div>
    <div id="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>ROUND <b id="round">1 / 5</b></span>
      <span>BEST <b id="best">0</b></span>
      <span id="power-label">POWER</span>
      <div id="power-wrap"><div id="power-fill"></div></div>
      <span id="instruction">AIM</span>
      <span id="prompt"></span>
    </div>
    <div id="controls">
      <div id="joystick" aria-label="Aim joystick"><div id="joystick-knob"></div></div>
      <div id="buttons">
        <button id="shoot-btn" type="button">SHOOT</button>
        <button id="reset-btn" type="button">RESET</button>
      </div>
    </div>

    <script type="module" src="/dist/harness.js"></script>
  </body>
</html>
