<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axiom — Sports Physics Lab</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; color: #d8f6ec;
                 font-family: ui-monospace, Menlo, Consolas, monospace; }
    main { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
    canvas { width: min(92vw, 960px); aspect-ratio: 16 / 9; background: #000;
             border: 1px solid #223; touch-action: none; }

    /* On-screen keypad (D-pad) — carried over from the gallery shell's styles.css. */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      grid-template-areas:
        ".    up    ."
        "left fire  right"
        ".    down  .";
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
      user-select: none;
      -webkit-user-select: none;
    }
    .keypad .pad {
      width: 64px;
      height: 64px;
      font-size: 24px;
      color: #d7dbe2;
      background: #1b1e25;
      border: 1px solid #2a2e36;
      border-radius: 12px;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .keypad .pad.active {
      background: #7fd17f;
      color: #10130f;
      border-color: #7fd17f;
    }
    .pad-up { grid-area: up; }
    .pad-down { grid-area: down; }
    .pad-left { grid-area: left; }
    .pad-right { grid-area: right; }
    .pad-fire {
      grid-area: fire;
      font-size: 12px;
      font-weight: 700;
      color: #f0d9d9;
      background: #5a2330;
      border-color: #7a3340;
    }
    .pad-fire.active {
      background: #e07a7a;
      color: #2a0d10;
      border-color: #e07a7a;
    }
  </style>
</head>
<body>
<main>
  <h1>Sports Physics Lab</h1>
  <canvas id="axiom-sports-physics-lab-canvas"></canvas>
  <div id="keypad"></div>
</main>
<script type="module">
  import init, { sports_physics_lab_start, overlay_start } from "./pkg/axiom_sports_physics_lab.js";
  import { renderKeypad } from "./keypad.js";
  await init();
  sports_physics_lab_start();
  overlay_start();
  renderKeypad(document.getElementById("keypad"), [
    { key: "w", label: "▲", pos: "up" },
    { key: "a", label: "◀", pos: "left" },
    { key: "d", label: "▶", pos: "right" },
    { key: "s", label: "▼", pos: "down" },
    { key: "v", label: "VIEW", pos: "fire" },
  ]);
</script>
</body>
</html>
