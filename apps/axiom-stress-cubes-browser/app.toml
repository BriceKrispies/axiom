# Axiom app manifest — axiom-stress-cubes-browser.
#
# A browser/WASM load-stress visual: a field of N spinning cubes, authored as
# pure scene description on the engine's App API. Like the other browser apps it
# composes a single module — the `axiom` umbrella (`engine`) — which internally
# pulls in the slice modules and the live windowing/wgpu backend (wasm32). The
# app names no layer directly; the authoring vocabulary all arrives through
# `axiom::prelude`. The wasm entry (`start`) calls `App::run`. It depends on no
# other app — apps are leaves in the dependency graph.

[app]
name = "stress-cubes-browser-demo"
crate_name = "axiom-stress-cubes-browser"

allowed_layers = []

allowed_modules = [
    "engine",
]
