<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axiom — Stress (N spinning cubes, on just the engine)</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; gap: 12px; padding: 24px;
        font: 14px/1.5 system-ui, sans-serif; background: #0c0d10; color: #d7dbe2;
      }
      h1 { font-size: 16px; font-weight: 600; margin: 0; }
      /* The canvas id MUST match the surface id in src/lib.rs. */
      #axiom-stress-canvas {
        width: 1280px; height: 800px; max-width: 100%;
        border: 1px solid #2a2e36; border-radius: 6px; background: #000;
      }
      #bar { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
      #presets a {
        color: #9fb6ff; text-decoration: none; padding: 2px 8px;
        border: 1px solid #2a2e36; border-radius: 4px; margin: 0 2px;
      }
      #presets a.active { background: #1b2030; border-color: #3a44aa; color: #cfe0ff; }
      #hud {
        font-family: ui-monospace, monospace; white-space: pre;
        display: flex; gap: 18px;
      }
      #fps { color: #7fd17f; font-weight: 600; }
      #status { font-family: ui-monospace, monospace; }
      .ok { color: #7fd17f; } .err { color: #e07a7a; }
    </style>
  </head>
  <body>
    <h1>Axiom — N spinning cubes, built on just the engine</h1>

    <div id="bar">
      <span id="presets">cubes:</span>
      <div id="hud">
        <span>drawn: <b id="count">—</b></span>
        <span>fps: <b id="fps">—</b></span>
        <span>frame: <b id="ms">—</b> ms</span>
      </div>
    </div>

    <canvas id="axiom-stress-canvas" width="1280" height="800"></canvas>
    <div id="status">booting…</div>

    <script type="module">
      // Cube count comes from ?cubes=N (default 1000). Build a preset row that
      // reloads the page with a new count — the scene is authored at startup.
      const params = new URLSearchParams(location.search);
      const cubes = Math.max(1, parseInt(params.get("cubes") ?? "1000", 10) || 1000);

      const presets = [100, 500, 1000, 2500, 5000, 10000, 25000];
      const row = document.getElementById("presets");
      for (const n of presets) {
        const a = document.createElement("a");
        a.href = `?cubes=${n}`;
        a.textContent = n.toLocaleString();
        if (n === cubes) a.className = "active";
        row.appendChild(a);
      }
      document.getElementById("count").textContent = cubes.toLocaleString();

      // FPS counter: an independent requestAnimationFrame loop on the main
      // thread. Because the engine's render loop runs on the same thread, this
      // measures the true delivered frame rate — when a frame's CPU+GPU work
      // overruns the vsync budget, this counter drops with it.
      const fpsEl = document.getElementById("fps");
      const msEl = document.getElementById("ms");
      let last = performance.now();
      let acc = 0, frames = 0;
      function tickFps(now) {
        const dt = now - last;
        last = now;
        acc += dt; frames += 1;
        if (acc >= 500) {
          const fps = (frames * 1000) / acc;
          fpsEl.textContent = fps.toFixed(1);
          msEl.textContent = (acc / frames).toFixed(1);
          fpsEl.style.color = fps >= 50 ? "#7fd17f" : fps >= 25 ? "#e0c97a" : "#e07a7a";
          acc = 0; frames = 0;
        }
        requestAnimationFrame(tickFps);
      }
      requestAnimationFrame(tickFps);

      // Cache-bust the JS glue + wasm on every load (the dev server sends no
      // cache headers).
      const v = Date.now();
      const { default: init, start } =
        await import(`./pkg/axiom_stress_cubes_browser.js?v=${v}`);
      const wasmUrl = new URL(`./pkg/axiom_stress_cubes_browser_bg.wasm?v=${v}`, import.meta.url);

      const status = document.getElementById("status");
      const set = (msg, cls) => { status.textContent = msg; status.className = cls ?? ""; };

      async function main() {
        if (!("gpu" in navigator)) {
          set("WebGPU is not available. Use a recent Chrome/Edge, Android Chrome, or iOS Safari 18.2+.", "err");
          return;
        }
        try {
          await init({ module_or_path: wasmUrl });
          start(cubes);
          set(`Rendering ${cubes.toLocaleString()} spinning cubes. Click a preset above to change the count.`, "ok");
        } catch (e) {
          set("Startup failed: " + e, "err");
          throw e;
        }
      }
      main();
    </script>
  </body>
</html>
