# Semantic vertical-slice contract for the stress-cubes App-core render boundary.
#
# Carved out of the merged gallery's `apps/axiom-gallery/slice.toml` in the
# gallery de-merge. The slice is proven at the boundary the demo actually
# renders through: `RunningApp::tick -> FrameOutcome` (the mesh-batch /
# camera-view-proj / light data the live GPU and Canvas2D backends consume).
# `tests/render_determinism.rs` pins that boundary with a committed golden
# `.bin`, a replay-equal assertion, and a NEGATIVE (perturbed-differs)
# assertion — a later animated tick.
#
# `harness_entry` names the renderable App-core this crate exposes; `harness`
# points at the axiom-shot registration (`--app stress-cubes`, `--cubes N`).
# The golden is SHA-256-pinned, so a deleted / regenerated / hand-edited golden
# is caught by `xtask check-slices` (the checker owns the baseline, not the
# test's AXIOM_REGOLD capture path).
[slice]
name = "stress-cubes"
crate_name = "axiom-stress-cubes"
harness_entry = "stress_cubes_core"
determinism_test = "render_determinism"
harness = "stress-cubes"

[[golden]]
path = "tests/golden/stress_cubes_render_tick0.bin"
sha256 = "14f4ddc265bfb554f5f7a476ee8e24aa532a105ff269c4393a9035dfdb096938"
