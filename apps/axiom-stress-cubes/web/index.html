<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axiom — Stress (N cubes)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; color: #d8f6ec;
                 font-family: ui-monospace, Menlo, Consolas, monospace; }
    main { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
    canvas { width: min(92vw, 960px); aspect-ratio: 16 / 10; background: #000;
             border: 1px solid #223; touch-action: none; }
    .cubebar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .cubebar-label { opacity: 0.7; }
    .cubebar a { color: #d8f6ec; text-decoration: none; padding: 2px 8px;
                 border: 1px solid #223; border-radius: 4px; }
    .cubebar a.active { border-color: #2e8; color: #2e8; }
    .fps { margin-left: 8px; opacity: 0.9; }
    .status { min-height: 1.2em; opacity: 0.8; font-size: 0.9em; }
    .status.err { color: #f88; }
  </style>
</head>
<body>
<main>
  <h1>Stress (N cubes)</h1>
  <canvas id="axiom-stress-canvas" width="1280" height="800"></canvas>
  <div id="controls" class="cubebar"></div>
  <div id="status" class="status">booting…</div>
</main>
<script type="module">
  import init, { stress_start, overlay_start } from "./pkg/axiom_stress_cubes.js";

  // The cube-count presets offered by the control bar.
  const CUBE_PRESETS = [100, 500, 1000, 2000, 5000, 10000, 25000];

  // Read the requested cube count from `?cubes=`, defaulting to 2000 and never
  // below 1 (matching the Rust `stress_start` clamp).
  const params = new URLSearchParams(location.search);
  const cubes = Math.max(1, parseInt(params.get("cubes") ?? "2000", 10) || 2000);

  // Mount the control bar: cube-count presets that reload the page with
  // `?cubes=N` applied, plus a live FPS / frame-time readout. The FPS counter
  // is an independent requestAnimationFrame loop on the main thread, so it
  // measures the true delivered frame rate — when a frame's CPU+GPU work
  // overruns the vsync budget, this drops with it.
  const controls = document.getElementById("controls");
  const label = document.createElement("span");
  label.className = "cubebar-label";
  label.textContent = "cubes:";
  controls.appendChild(label);
  for (const n of CUBE_PRESETS) {
    const a = document.createElement("a");
    const q = new URLSearchParams(location.search);
    q.set("cubes", String(n));
    a.href = "?" + q.toString();
    a.textContent = n.toLocaleString();
    if (n === cubes) a.className = "active";
    controls.appendChild(a);
  }
  const fps = document.createElement("span");
  fps.className = "fps";
  fps.textContent = "fps: —";
  controls.appendChild(fps);

  let last = performance.now();
  let acc = 0;
  let frames = 0;
  const loop = (now) => {
    acc += now - last;
    last = now;
    frames += 1;
    if (acc >= 500) {
      const value = (frames * 1000) / acc;
      fps.textContent = `fps: ${value.toFixed(1)}  (${(acc / frames).toFixed(1)} ms)`;
      acc = 0;
      frames = 0;
    }
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);

  const status = document.getElementById("status");
  try {
    await init();
    stress_start(cubes);
    overlay_start();
    status.textContent =
      `Engine started — rendering ${cubes.toLocaleString()} spinning cubes. ` +
      "Pick a cube count above and watch the FPS.";
  } catch (e) {
    console.error(e);
    status.className = "status err";
    status.textContent = "Failed to start: " + e;
  }
</script>
</body>
</html>
