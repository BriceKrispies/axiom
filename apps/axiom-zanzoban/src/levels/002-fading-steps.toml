# Showcase: afterimage decay + resonance wells.
# Leave a ghost holding the button, but it fades after 8 steps — cross in time,
# or route it over the resonance well to refresh its life.
title = "Fading Steps"
width = 9
height = 5

[player]
start = [1, 2]

[exit]
position = [7, 2]

[rules.decay]
lifetime_steps = 8

[[buttons]]
position = [3, 2]
group = "gate"

[[doors]]
position = [5, 2]
group = "gate"

[[wells]]
position = [3, 3]
