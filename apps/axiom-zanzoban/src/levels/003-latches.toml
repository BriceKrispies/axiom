# Showcase: latching switches. Stepping on the switch flips its door open and it
# stays open — no ghost needed to hold it.
title = "Latches"
width = 9
height = 5

[player]
start = [1, 2]

[exit]
position = [7, 2]

[rules]
switches = true

[[switches]]
position = [3, 2]
group = "a"

[[doors]]
position = [5, 2]
group = "a"
