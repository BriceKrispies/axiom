PROCESS FINDINGS (the honesty flags this pass owes):
1. RIGHT-AXIS: the next axis is correctly scene_props_completeness = 0 — it is
   still the lowest and still absent. But pass-1 spent its effort on higher axes
   (color/material/lighting/framing) and left the lowest axis untouched. Because
   final_score = lowest*0.7 + avg*0.3, an untouched 0 pins final_score at 0.5 no
