candidate_screenshot = "champion.png"
decision = "scoring_baseline"
abstraction_introduced = false
next_attacked_axis = "scene_props_completeness"
reason = """
CRITIC baseline calibration (first pass). Scored the champion against
reference.png at the parity bar, harshly. final_score = 0.5; lowest axis =
scene_props_completeness = 0, so it is the next axis to attack.

Root-cause finding (verified in apps/casino-games/web/src/games/
treasure-chest-pick/scene.ts): the app renders ONLY nine chests on a turquoise
platform disc plus a stage-room backdrop and reveal lights. The reference's
entire beach diorama — warm sand ground, palm tree (with a long soft shadow),
red crab, sand castle + flag, starfish, seashells, scattered gold nuggets — does
NOT exist in the game. scene_props_completeness = 0 is therefore 'not built',
not merely 'cropped off-frame'. This is the dominant identity gap.

COUPLING NOTE for whoever attacks scene_props_completeness: it is entangled with
composition_and_framing = 1. The champion is captured at 960x600 (capture.md),
which frames only the pool; the reference (1568x968) frames the pool as ~60% of
a wide beach with sand margins holding the props. Building the beach diorama will
not read unless the camera framing also widens to include those margins.
Whoever takes this axis must (a) add the beach ground + props as real geometry
AND (b) widen the framing so they are on-screen — otherwise props will be built
but stay outside the captured frame, moving no number honestly.

ABSTRACTION-GATE NOTE: adding a palm tree / crab / castle / starfish / shells is
new geometry that the config/manifest layer genuinely CANNOT express (there is
no beach-prop manifest surface today). Per the skill, that is the 'inexpressible'
branch of the gate — the structural fix is legitimate on the FIRST attempt (do
NOT burn three ceremonial config nudges first), but it MUST ship with an
abstractions/NNNN.toml recording inexpressible = true, failed_attempts = [], and
the smallest new surface at the lowest correct layer.

No abstraction record is owed at iteration 0: the baseline champion is the app's
pre-existing render, not a convergence structural change.
"""

