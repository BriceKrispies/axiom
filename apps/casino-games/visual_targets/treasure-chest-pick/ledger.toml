   improve final_score. Attacking anything but scene_props_completeness next is
   churning secondary numbers while the dominant identity gap stays at 0.
2. PROMOTION: per the skill's decision table, when the attacked axis does not
   improve the outcome is start_new_candidate_branch (keep old champion), not a
