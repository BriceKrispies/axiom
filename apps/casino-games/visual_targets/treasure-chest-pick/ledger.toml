This iteration re-verifies the scorecard against the actual pass-1 champion and
records the finding. NO number changed (no inflation was found; nothing was
lowered): pass-1 moved no axis TOWARD identity, so the honest re-score equals the
baseline. This entry exists so the record stops silently carrying a swapped image
