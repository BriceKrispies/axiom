<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axiom — Casino Games</title>
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/marquee.css" />
    <link rel="stylesheet" href="/styles/controls.css" />
    <link rel="stylesheet" href="/styles/catalog.css" />
    <link rel="stylesheet" href="/styles/cabinet-hud.css" />
    <link rel="stylesheet" href="/styles/operator-panel.css" />
  </head>
  <body>
    <header class="cab-header">
      <h1 class="cab-bitmap cab-header-title">AXIOM <span class="cab-accent">ARCADE</span></h1>
      <div class="cab-bulb-row is-lit" aria-hidden="true">
        <span class="cab-bulb"></span><span class="cab-bulb"></span><span class="cab-bulb"></span>
        <span class="cab-bulb"></span><span class="cab-bulb"></span>
      </div>
      <div class="cab-spacer"></div>
      <button id="btn-mute" class="cab-btn cab-btn--toggle" aria-pressed="false" title="Mute all sound">🔊</button>
      <button id="btn-settings" class="cab-btn cab-btn--service">SET</button>
    </header>

    <section id="catalog" class="cab-floor" aria-label="Game catalog">
      <div class="cab-floor-heading">
        <h2 class="cab-bitmap">Prize Floor</h2>
        <span>walk up &amp; play — pick your machine</span>
      </div>
      <div id="filters" role="group" aria-label="Filter games"></div>
      <div class="cab-row-wrap">
        <button class="cab-arrow cab-arrow--left" id="floor-prev" aria-label="Previous machine">◀</button>
        <div id="cards" role="listbox" aria-label="Arcade machines" tabindex="0"></div>
        <button class="cab-arrow cab-arrow--right" id="floor-next" aria-label="Next machine">▶</button>
      </div>
    </section>

    <section id="game-screen" aria-label="Game">
      <div class="cab-cabinet">
        <div class="cab-cabinet-marquee">
          <button id="btn-back" class="cab-btn cab-btn--arrow">◀ FLOOR</button>
          <canvas id="game-marquee-glyph" class="cab-machine-glyph" width="56" height="56" aria-hidden="true"></canvas>
          <h2 id="game-title" class="cab-bitmap cab-cabinet-title">—</h2>
          <button id="btn-game-settings" class="cab-btn cab-btn--service" title="Settings">SET</button>
        </div>
        <div class="cab-screen-wrap">
          <div class="cab-rail cab-rail--left">
            <button id="btn-game-mute" class="cab-btn cab-btn--toggle" aria-pressed="false">🔊</button>
            <span class="cab-readout" id="seed-label"></span>
          </div>
          <div class="cab-rail cab-rail--right">
            <button id="btn-replay" class="cab-btn cab-btn--stamp">REPLAY</button>
            <button id="btn-configure" class="cab-btn cab-btn--service" title="Configure">SET&nbsp;UP</button>
          </div>
          <div id="instruction" class="cab-signboard" aria-live="polite"></div>
          <div id="stage">
            <canvas id="axiom-canvas" width="960" height="600"></canvas>
            <div id="result-banner" aria-live="polite"></div>
          </div>
        </div>
        <div class="cab-footer">
          <button id="btn-new-round" class="cab-btn cab-btn--start">NEW ROUND</button>
        </div>
      </div>
    </section>

    <section id="workbench" class="cab-panel" aria-label="Configuration workbench"></section>
    <section id="settings" class="cab-panel" aria-label="Settings"></section>
    <div id="diagnostics" aria-label="Diagnostics"></div>

    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
