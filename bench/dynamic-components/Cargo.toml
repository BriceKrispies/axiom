# Standalone (own `[workspace]`, excluded from the main workspace's gates because
# it needs `unsafe`, which engine crates forbid). Run with:
#   cargo run --release --manifest-path bench/dynamic-components/Cargo.toml
[package]
name = "dynamic-component-bench"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
