[package]
name = "axiom-crypto"
description = "Axiom layer: authenticated identity. A deterministic ed25519 signing/verification primitive (sign, verify, and wire-serializable keys + signatures) that higher layers and modules use to prove the AUTHOR of a message — e.g. netcode signs each input so a peer cannot forge another peer's inputs even through an untrusted relay."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. The signing/verification surface is deterministic and
# platform-agnostic; OS entropy for key generation is injected at the edge (an
# app provides a 32-byte seed via `from_seed`), so this layer holds no
# nondeterminism and no browser/platform APIs.
crate-type = ["rlib"]

[dependencies]
# Layer dependency: the kernel only (binary writer/reader + result/error model
# for wire serialization). Enforced by the Axiom Layer Law.
axiom-kernel = { path = "../axiom-kernel" }

# A vetted ed25519 implementation (RFC 8032 — deterministic signing). We wrap it
# behind a thin facade rather than hand-rolling the cipher: rolling your own
# crypto is exactly the kind of shortcut Axiom forbids. Default features only;
# we never call randomized key generation here (the deterministic core takes a
# seed), so no RNG / getrandom dependency leaks into the engine spine.
ed25519-dalek = "2"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
