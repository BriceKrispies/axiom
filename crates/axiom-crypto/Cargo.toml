[package]
name = "axiom-crypto"
description = "Axiom layer: authenticated identity. A deterministic ed25519 signing/verification primitive (sign, verify, and wire-serializable keys + signatures) that higher layers and modules use to prove the AUTHOR of a message — e.g. netcode signs each input so a peer cannot forge another peer's inputs even through an untrusted relay."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# OS entropy for key generation is injected at the edge (an app provides a
# 32-byte seed via `from_seed`); this layer itself holds no nondeterminism.
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../axiom-kernel" }

# Vetted ed25519 (RFC 8032, deterministic signing). Default features only; key
# generation here always takes a seed, so no RNG/getrandom dependency leaks in.
ed25519-dalek = "2"

# Vetted SHA-2 (already in the tree via ed25519-dalek); HMAC-SHA256 and the
# HS256 JWT verifier are built on it.
sha2 = "0.10"

# Used only to read a verified token's claims (`exp` / `sub`).
serde_json = "1"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
