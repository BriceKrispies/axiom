[package]
name = "axiom-ecs"
description = "Axiom Layer 05: the generic deterministic world store. Entities plus a consumer-defined component row, with frame-gated system execution — the single world model feature modules and apps build on."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../axiom-kernel" }
axiom-frame = { path = "../axiom-frame" }

[dev-dependencies]
# Used only to synthesize real `FrameContext` fixtures for `World::advance` tests.
axiom-host = { path = "../axiom-host" }
axiom-runtime = { path = "../axiom-runtime" }
axiom-math = { path = "../axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
