# Axiom layer manifest — Layer 05 (axiom-ecs).
#
# ECS is the engine's world model: the single place entities and their
# component data live. It is generic — a consumer supplies the component row
# type `R` — and deterministic (entities are ordered by stable `EntityId`). It
# advances its registered systems once per engine frame, gated by the frame's
# lifecycle/step state, which is its semantic adapter over Layer 04 (frame).
#
# It knows nothing about scenes, transforms, rendering, physics, or any concrete
# component — those are defined by the apps/modules that build on it.
#
# Layer-05 logical capabilities (documentation only — Rust public surface is the
# curated re-export list in `lib.rs`):
#   - generic-entity-component-store
#   - deterministic-entity-ordering
#   - world-system-registration
#   - startup-update-schedule-phases
#   - frame-gated-world-advance

[layer]
name = "ecs"
crate_name = "axiom-ecs"
depends_on = ["kernel", "frame"]
meaningful_dependency = "ECS consumes the kernel `EntityId` for stable, ordered, serializable entity identity, and the frame contract (`FrameContext`) to advance its registered world systems once per engine frame — gated on `is_skipped` / `runtime_step_count`, the same way `axiom-scene::advance` is — exposing the single generic world store every feature module and app composes on."

introduced_capabilities = ["World", "EntityRegistry", "ComponentColumn", "WorldSystem", "WorldStep", "SchedulePhase", "ErasedColumn", "ColumnSet", "DynamicComponents"]

consumed_capabilities = ["EntityId", "FrameContext"]

# `World::advance` consumes `FrameContext` (Layer 04) to gate per-frame system
# execution — the honest adapter over the previous layer.
[[proof_exports]]
export = "World"
must_reference = ["FrameContext"]
