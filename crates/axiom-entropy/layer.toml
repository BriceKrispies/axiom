[layer]
name = "entropy"
crate_name = "axiom-entropy"
depends_on = ["kernel", "space"]

meaningful_dependency = """
Entropy adapts the kernel's DeterministicRng (the seeded splitmix64 source) and
StableHash (canonical-bytes digest) together with space's Address into an
address-and-version-keyed entropy stream: EntropyApi::stream hashes
(seed, SpaceApi::digest(address), version) into a derived key and seeds a
DeterministicRng with it, so the same (seed, address, version) always yields the
same sequence and two distinct sites never share state. fork(salt) derives an
isolated sub-stream from a stream's stable key. It introduces no new randomness;
it routes and keys the determinism the kernel already provides, named by a space
Address.
"""

introduced_capabilities = ["EntropyApi", "EntropyStream"]
consumed_capabilities = ["DeterministicRng", "StableHash", "SpaceApi", "Address"]

[[proof_exports]]
export = "EntropyApi"
must_reference = ["StableHash", "Address"]

[[proof_exports]]
export = "EntropyStream"
must_reference = ["DeterministicRng"]
