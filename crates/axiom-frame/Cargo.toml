[package]
name = "axiom-frame"
description = "Axiom Layer 04: the canonical engine frame boundary. Adapts host frame reports, runtime step records, and viewport facts into a stable per-frame contract future engine systems consume."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free and wasm-clean.
crate-type = ["rlib"]

[dependencies]
# Layer 04 may import only layers 00, 01, and 03. The Axiom Layer Law
# and `cargo xtask check-architecture` enforce that nothing else slips in.
axiom-kernel = { path = "../axiom-kernel" }
axiom-runtime = { path = "../axiom-runtime" }
axiom-host = { path = "../axiom-host" }
# Build-time Support crate (zone marker attributes); allowed for all engine code.
axiom-zones = { path = "../axiom-zones" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
