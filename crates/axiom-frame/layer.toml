[layer]
name = "frame"
crate_name = "axiom-frame"
depends_on = ["kernel", "runtime", "host"]
meaningful_dependency = "Frame consumes host (`HostFrameReport`, `HostViewport`, `HostLifecycleState`, `HostSkipReason` for host adaptation, including the viewport's kernel `Ratio` scale factor and aspect ratio), runtime (`RuntimeStepRecord` for ordered step summaries), and kernel (`Tick`, `FrameIndex`, `TelemetryMetric`) — and exposes the deterministic engine frame contract every future engine system will read from. Finiteness of viewport-derived scalars is guaranteed by the kernel `Ratio` type the viewport carries, so no math layer is needed."

introduced_capabilities = ["FrameApi", "EngineFrame", "FrameBuilder"]

consumed_capabilities = [
    "HostFrameReport",
    "HostViewport",
    "HostLifecycleState",
    "HostSkipReason",
    "RuntimeStepRecord",
    "Tick",
    "FrameIndex",
    "TelemetryMetric",
]

[[proof_exports]]
export = "FrameApi"
must_reference = ["HostFrameReport", "HostViewport"]

[[proof_exports]]
export = "EngineFrame"
must_reference = ["HostFrameReport"]

[[proof_exports]]
export = "FrameBuilder"
must_reference = ["HostFrameReport"]
