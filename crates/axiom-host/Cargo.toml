[package]
name = "axiom-host"
description = "Axiom Layer 03: the deterministic platform/host boundary. Validates host-supplied viewport/frame/lifecycle data and adapts it into runtime stepping. Browser-free and wasm-clean."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free and wasm-clean.
crate-type = ["rlib"]

[dependencies]
# Layer 03 may import only lower layers. The Axiom Layer Law and
# `cargo xtask check-architecture` enforce that nothing else slips in. Host
# consumes runtime (stepping) and kernel (identities, telemetry, the `Ratio`
# quantity type that validates viewport scale factors at the boundary).
axiom-kernel = { path = "../axiom-kernel" }
axiom-runtime = { path = "../axiom-runtime" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
