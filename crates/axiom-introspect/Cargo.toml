[package]
name = "axiom-introspect"
description = "Axiom Layer 06: the engine introspection surface. Adapts the frame contract into a retained, byte-serializable, queryable per-frame model (with frame timing, history-window snapshots, diffs, and failure queries), and observes the ECS world, so an agent can interrogate a running engine."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../axiom-kernel" }
axiom-frame = { path = "../axiom-frame" }
axiom-ecs = { path = "../axiom-ecs" }

[dev-dependencies]
# Test-only fixtures for real EngineFrames; never imported by runtime code.
axiom-host = { path = "../axiom-host" }
axiom-runtime = { path = "../axiom-runtime" }
axiom-math = { path = "../axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
