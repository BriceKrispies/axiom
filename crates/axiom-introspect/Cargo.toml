[package]
name = "axiom-introspect"
description = "Axiom Layer 06: the engine introspection surface. Adapts the frame contract into a retained, byte-serializable, queryable per-frame model (with frame timing, history-window snapshots, diffs, and failure queries), and observes the ECS world, so an agent can interrogate a running engine."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free and wasm-clean.
crate-type = ["rlib"]

[dependencies]
# Layer 05 imports only the kernel and the frame layer it adapts. The Axiom
# Layer Law and `cargo xtask check-architecture` enforce that nothing else
# slips in.
axiom-kernel = { path = "../axiom-kernel" }
axiom-frame = { path = "../axiom-frame" }
axiom-ecs = { path = "../axiom-ecs" }

[dev-dependencies]
# Test-only: lower layers used to synthesize real `EngineFrame` fixtures the
# introspection adapters run against (the same path the frame layer's own
# tests use). Never imported by the layer's runtime code.
axiom-host = { path = "../axiom-host" }
axiom-runtime = { path = "../axiom-runtime" }
axiom-math = { path = "../axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
