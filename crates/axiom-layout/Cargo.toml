[package]
name = "axiom-layout"
description = "Axiom layer: the deterministic, mobile-first responsive layout solver. Given the host viewport facts (size, orientation, safe-area insets) and a flat flex/constraint node tree, it computes a placed rectangle per node — the engine deciding how to order and place on-screen regions, mobile-first by default, instead of per-app CSS. Pure data in, placed rects out: no browser, no renderer, no app concepts."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../axiom-kernel" }
axiom-host = { path = "../axiom-host" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
