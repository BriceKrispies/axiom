[package]
name = "axiom-math"
description = "Axiom Layer 02: deterministic math and geometry primitives (scalar policy, vectors, quaternions, 4x4 matrices, transforms, AABBs, spheres, rays, planes, frusta)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../axiom-kernel" }
axiom-runtime = { path = "../axiom-runtime" }
axiom-zones = { path = "../axiom-zones" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
