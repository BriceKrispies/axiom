[layer]
name = "math"
crate_name = "axiom-math"
depends_on = ["kernel", "runtime"]
meaningful_dependency = "Math consumes kernel primitives (`KernelApi` for binary serialization, `KernelResult`/`KernelError` for wrapped deserialization failures) and runtime substrate (`RuntimeContext`, `TelemetryMetric`) to provide deterministic-scalar, vector, quaternion, 4x4-matrix, transform, and geometry primitives — with checked failures, approximate-equality, and binary round-trip — that every later rendering / scene / physics / animation / culling layer will build on."

introduced_capabilities = ["MathApi"]

consumed_capabilities = [
    "KernelApi",
    "KernelResult",
    "KernelError",
    "RuntimeContext",
    "TelemetryMetric",
    "Tick",
]

[[proof_exports]]
export = "MathApi"
must_reference = ["KernelApi", "RuntimeContext", "TelemetryMetric"]
