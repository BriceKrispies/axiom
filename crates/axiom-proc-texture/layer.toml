[layer]
name = "proc-texture"
crate_name = "axiom-proc-texture"
depends_on = ["recipe", "proc-core", "space", "noise", "math"]

meaningful_dependency = """
Proc-texture adapts recipe parameter words (axiom-recipe Param), the shared graph
executor (axiom-proc-core ProcCore/NodeEval), a root address (axiom-space
SpaceApi), value noise (axiom-noise value_noise) and a sample point (axiom-math
Vec3) into a small set of texture operators. ProcTextureApi bakes a texture recipe
through ProcCore with a branchless const-table evaluator into a neutral RGBA8
TextureBuffer. The per-node entropy stream that seeds the Noise operator is
proc-core's contract, delivered through NodeEval - axiom-entropy is a transitive
dependency of proc-core, not a direct one here.
"""

introduced_capabilities = ["ProcTextureApi", "TextureBuffer", "TextureOp"]
consumed_capabilities = ["Param", "ProcCore", "NodeEval", "SpaceApi", "value_noise", "Vec3"]

[[proof_exports]]
export = "ProcTextureApi"
must_reference = ["ProcCore", "SpaceApi"]
