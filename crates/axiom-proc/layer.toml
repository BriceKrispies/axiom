[layer]
name = "proc"
crate_name = "axiom-proc"
depends_on = ["kernel", "space", "entropy"]

meaningful_dependency = """
Proc adapts entropy's address-keyed stream, space's Address, and the kernel's
serialization + digest into a deterministic recipe-graph evaluator. ProcApi
validates a Recipe as a DAG, keys an EntropyApi stream by
(seed, address, recipe.version), evaluates the generic nodes branchlessly (a table
dispatch over the op discriminant), and emits a neutral Artifact + ProcTrace whose
canonical bytes (BinaryWriter, SchemaVersion-stamped) carry a StableHash digest.
Evaluation is resumable and budget-independent. It owns no domain content - the
artifact is opaque words; meaning is a domain module's job.
"""

introduced_capabilities = ["ProcApi", "Recipe", "Artifact", "ProcTrace", "Evaluation"]
consumed_capabilities = ["EntropyApi", "EntropyStream", "Address", "StableHash", "BinaryWriter", "SchemaVersion"]

[[proof_exports]]
export = "ProcApi"
must_reference = ["EntropyApi", "Address"]

[[proof_exports]]
export = "Artifact"
must_reference = ["StableHash"]
