[package]
name = "axiom-recipe"
description = "Axiom layer: the domain-agnostic procedural recipe graph. A recipe is a stable-id'd, versioned DAG of operator nodes — each an opaque operator code, a flat list of raw parameter words, and links to strictly-earlier nodes — plus validation (cycle/forward-reference and bound checks) and deterministic little-endian serialization stamped with a SchemaVersion and digested with a StableHash. It owns the graph container only: what an operator code means, and how a node is evaluated, is a higher generation layer's job. Branchless and 100% covered."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# The recipe is expressed purely in kernel primitives: stable ids and raw words,
# with kernel serialization (BinaryWriter/BinaryReader), a SchemaVersion stamp,
# and a StableHash digest. No math, no domain content.
axiom-kernel = { path = "../axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
