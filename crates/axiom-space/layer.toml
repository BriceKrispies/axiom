[layer]
name = "space"
crate_name = "axiom-space"
depends_on = ["kernel"]

meaningful_dependency = """
Space adapts the kernel's StableHash (the canonical-bytes digest), BinaryWriter /
BinaryReader (canonical little-endian serialization), and KernelResult into a
deterministic, hashable, serializable Address — the stable name for what/where
content is generated. SpaceApi mints addresses (root/child/parent over a
hierarchical u64 key-path), digests them through StableHash, and round-trips them
through the kernel's binary primitives, so the same address always serializes to
the same bytes and the same digest on every platform. It owns no geometry (that
is math) and no domain meaning: an address names a site, it does not generate one.
"""

introduced_capabilities = ["SpaceApi", "Address"]
consumed_capabilities = ["StableHash", "BinaryWriter", "BinaryReader", "KernelResult"]

[[proof_exports]]
export = "SpaceApi"
must_reference = ["StableHash"]
