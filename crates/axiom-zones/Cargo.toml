# axiom-zones: proc-macro zone-marker attributes (Support crate, not a layer).
[package]
name = "axiom-zones"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full"] }
