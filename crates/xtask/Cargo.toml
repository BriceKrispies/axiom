[package]
name = "xtask"
description = "Axiom repo-local tooling. Not a layer: enforces the Axiom Layer Law via `cargo xtask check-architecture`."
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "xtask"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# Faithfully evaluates the coverage gate's --ignore-filename-regex pattern
# (same regex engine as llvm-cov); see coverage_scope.rs.
regex = "1"
