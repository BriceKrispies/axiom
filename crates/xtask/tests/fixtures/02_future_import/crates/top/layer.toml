# Layer 2 — valid on its own (adapts its previous layer, `mid`). Present so that
# `mid`'s import of it is a genuine forward (future) import.
[layer]
name = "top"
index = 2
previous = "mid"
crate_name = "top"
allowed_dependencies = ["kernel", "mid"]
forbidden_dependencies = []
meaningful_dependency = "Top adapts mid."
introduced_capabilities = ["TopThing"]
consumed_capabilities = ["MidThing"]

[[proof_exports]]
export = "TopThing"
must_reference = ["MidThing"]
