# Layer 1 that reaches into a private module path of the kernel
# (`kernel::clock::KernelClock`) instead of its public root export.
[layer]
name = "runtime"
crate_name = "runtime"
depends_on = ["kernel"]
meaningful_dependency = "Runtime adapts the kernel clock (but via a private path)."
introduced_capabilities = ["Runtime"]
consumed_capabilities = ["KernelClock"]

[[proof_exports]]
export = "Runtime"
must_reference = ["KernelClock"]
