# The proof export `Runtime` is named here but is NOT public in source. The
# introduced capability `RuntimeApi` IS exported, so the only violation is the
# missing public proof export.
[layer]
name = "runtime"
crate_name = "runtime"
depends_on = ["kernel"]
meaningful_dependency = "Runtime adapts the kernel clock."
introduced_capabilities = ["RuntimeApi"]
consumed_capabilities = ["KernelClock"]

[[proof_exports]]
export = "Runtime"
must_reference = ["KernelClock"]
