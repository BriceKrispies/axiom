# Fully valid layer 1 with two proof exports, each genuinely referencing the
# previous layer's public symbols.
[layer]
name = "runtime"
crate_name = "runtime"
depends_on = ["kernel"]
meaningful_dependency = "Runtime orchestrates the deterministic kernel clock and result types into engine stepping and scheduling."
introduced_capabilities = ["Runtime", "RuntimeScheduler"]
consumed_capabilities = ["KernelClock", "KernelResult"]

[[proof_exports]]
export = "Runtime"
must_reference = ["KernelClock", "KernelResult"]

[[proof_exports]]
export = "RuntimeScheduler"
must_reference = ["KernelClock"]
