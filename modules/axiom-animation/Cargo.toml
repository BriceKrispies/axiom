[package]
name = "axiom-animation"
description = "Axiom engine module: minimal deterministic skeletal-animation mechanics — skeletons, poses, clip sampling, and pose blending. Contracts only; no runtime state machine, no character behaviour."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel: stable ids, Tick sampling time, Ratio blend factor, deterministic
# errors. math: Transform / Quat / Vec3 pose maths and the Quat::nlerp used to
# interpolate rotations.
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
