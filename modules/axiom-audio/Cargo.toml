[package]
name = "axiom-audio"
description = "Axiom engine module: deterministic audio bookkeeping (synthesis specs, sample/music playback, audio-clock scheduling, master volume/mute) behind one AudioApi facade. The neutral core owns *what plays and when* as data and is browser-free + 100% testable on native; the real Web Audio playback arm is a compiled-out wasm32 platform arm behind it."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. The deterministic core is browser-free and wasm-clean; the real
# Web Audio (`AudioContext`/oscillator/gain/buffer/analyser) presentation arm is a
# compiled-out `wasm32` platform arm that never enters this rlib's native build.
crate-type = ["rlib"]

[dependencies]
# An *engine module* (kind = "engine-module"): it composes NO other module
# (allowed_modules = []). The neutral core builds on the kernel ONLY — `HandleId`
# for sound/voice/input handles and `Ratio` for 0..1 volume/sustain/depth.
axiom-kernel = { path = "../../crates/axiom-kernel" }

# The live Web Audio playback arm, pulled in ONLY for wasm32, so native `cargo
# test`/coverage never compiles it and the deterministic core stays browser-free.
# This is a sanctioned platform-facing module (Module Law #9 /
# PLATFORM_FACING_MODULES): it owns the real `AudioContext` binding behind the
# native-clean core.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "AudioContext",
    "BaseAudioContext",
    "AudioNode",
    "AudioParam",
    "AudioDestinationNode",
    "GainNode",
    "OscillatorNode",
    "OscillatorType",
    "AudioBuffer",
    "AudioBufferSourceNode",
    "AnalyserNode",
    "MediaStream",
    "MediaStreamAudioSourceNode",
    "Window",
    "Navigator",
    "MediaDevices",
    "MediaStreamConstraints",
] }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
