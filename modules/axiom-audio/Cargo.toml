[package]
name = "axiom-audio"
description = "Axiom engine module: deterministic audio bookkeeping (synthesis specs, sample/music playback, audio-clock scheduling, master volume/mute) behind one AudioApi facade. The neutral core owns *what plays and when* as data and is browser-free + 100% testable on native; the real Web Audio playback arm is a compiled-out wasm32 platform arm behind it."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "AudioContext",
    "BaseAudioContext",
    "AudioNode",
    "AudioParam",
    "AudioDestinationNode",
    "GainNode",
    "OscillatorNode",
    "OscillatorType",
    "AudioBuffer",
    "AudioBufferSourceNode",
    "AnalyserNode",
    "MediaStream",
    "MediaStreamAudioSourceNode",
    "Window",
    "Navigator",
    "MediaDevices",
    "MediaStreamConstraints",
] }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
