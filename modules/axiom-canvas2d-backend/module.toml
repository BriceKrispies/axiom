# Consumes the same backend-neutral axiom_host::FramePacket as the GPU backend,
# so a game authored/tested against the normal render path stays recognizable
# when the backend is Canvas 2D.

[module]
name = "canvas2d-backend"
crate_name = "axiom-canvas2d-backend"
kind = "engine-module"

allowed_layers = [
    "host",
    "math",
]

allowed_modules = []

introduced_capabilities = [
    "canvas2d-fallback-presentation",
]
