[package]
name = "axiom-draw2d"
description = "Axiom SPEC-04 neutral 2D draw-list module: compiles author 2D-draw calls (shapes/sprites/text/gradients/camera+transform) into a deterministic, layer-sorted, hashable Draw2dList. Rasterizes nothing."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free, GPU-free, wasm-clean, deterministic.
crate-type = ["rlib"]

[dependencies]
# An isolated engine module that builds only on completed layers:
# the kernel (ids, dimensioned scalars Ratio/Radians/Meters) and math
# (Vec2 / Mat3 for the 2D transform stack). No other module, app, or tool.
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
