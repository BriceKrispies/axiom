[package]
name = "axiom-draw2d"
description = "Axiom SPEC-04 2D draw-list builder: the Draw2dApi facade compiles author 2D-draw calls (shapes/sprites/text/gradients/camera+transform) into the deterministic, layer-sorted, host-owned Draw2dList contract. Owns only the builder; the neutral contract types live in axiom-host. Rasterizes nothing."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-host = { path = "../../crates/axiom-host" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
