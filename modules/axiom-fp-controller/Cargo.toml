[package]
name = "axiom-fp-controller"
description = "Axiom engine module: the first-person walk+look controller. Integrates a frame of held movement/turn keys plus mouse-look deltas into a deterministic ground Pose (yaw about +Y, pitch clamped about local +X, movement rotated by yaw only), and builds the perspective camera view-projection that pose implies — seated an eye-height above the terrain. The reusable capability behind the gallery's first-person demos (forest_walk, generia); the browser event capture stays app-side, this is the pure, replayable math."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel::{Meters, Radians, Ratio} give the pose/tuning/lens their units; math
# ::{Mat4, Vec3} build the camera view-projection.
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
