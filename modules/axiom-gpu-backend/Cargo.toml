[package]
name = "axiom-gpu-backend"
description = "Axiom engine module: the real wgpu presentation backend. Built from a host presentation request, it owns the browser's GPU device/pipeline/buffers and presents instanced draws. The native-clean facade (surface size + readiness + no-op present) is 100% testable on native; the real wgpu/web-sys arm is compiled only for wasm32 behind it."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-host = { path = "../../crates/axiom-host" }

# host::Draw2dList carries math's Mat3/Vec2 (baked transform, rect corners);
# draw2d_geometry uses them directly to transform quad corners.
axiom-math = { path = "../../crates/axiom-math" }

# wgpu/bytemuck are optional: pulled in on native only by the `offscreen`
# feature; required unconditionally on wasm32 via the target table below.
# pollster drives the native off-screen device/readback (block_on).
wgpu = { version = "25", optional = true }
bytemuck = { version = "1", optional = true }
pollster = { version = "0.4", optional = true }

[features]
# Native off-screen rendering (the `axiom-shot` screenshot tool); off by
# default so the default native build/coverage/lint never compile this arm.
offscreen = ["dep:wgpu", "dep:bytemuck", "dep:pollster"]

[dev-dependencies]
# Test-only: builds a HostPresentationRequest, which needs a kernel handle source.
axiom-kernel = { path = "../../crates/axiom-kernel" }

# The live presentation arm (real wgpu + web-sys), pulled in only for wasm32.
# The `webgl` feature adds wgpu's WebGL2 backend alongside WebGPU so
# `live_gpu_binding::initialize` can fall back when a browser lacks WebGPU
# (see docs/render-fallback.md).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["HtmlCanvasElement", "console"] }
wgpu = { version = "25", features = ["webgl"] }
bytemuck = "1"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
