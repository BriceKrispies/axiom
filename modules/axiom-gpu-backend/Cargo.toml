[package]
name = "axiom-gpu-backend"
description = "Axiom engine module: the real wgpu presentation backend. Built from a host presentation request, it owns the browser's GPU device/pipeline/buffers and presents instanced draws. The native-clean facade (surface size + readiness + no-op present) is 100% testable on native; the real wgpu/web-sys arm is compiled only for wasm32 behind it."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. The native facade is browser-free and wasm-clean; the real
# wgpu/web-sys arm never enters this rlib's native build.
crate-type = ["rlib"]

[dependencies]
# An *engine module* (kind = "engine-module", allowed_modules = []): it composes
# NO other module. It builds on the host layer's deterministic presentation
# boundary (HostPresentationRequest), reading the physical surface size from it.
axiom-host = { path = "../../crates/axiom-host" }

# The neutral 2D draw contract (host::Draw2dList) carries math's Mat3 / Vec2 (each
# command's baked transform and rect corners); the GPU 2D geometry core
# (`draw2d_geometry`) names and uses them directly to transform quad corners.
# `math` is a layer below `host`, so depending on it is legal under the Module Law
# and is declared in allowed_layers — the same dependency the Canvas 2D backend
# declares, for the same reason.
axiom-math = { path = "../../crates/axiom-math" }

# wgpu + bytemuck are optional here so that on NATIVE they are pulled in only by
# the `offscreen` feature (the screenshot path); on wasm32 they are required
# unconditionally via the target table below. pollster drives the native
# off-screen device/readback (block_on) and is offscreen-only.
wgpu = { version = "25", optional = true }
bytemuck = { version = "1", optional = true }
pollster = { version = "0.4", optional = true }

[features]
# Native off-screen rendering (the `axiom-shot` screenshot tool). Off by default,
# so the engine's default native build, coverage gate, and branchless lint never
# compile the wgpu off-screen arm — the same exemption the wasm arm has.
offscreen = ["dep:wgpu", "dep:bytemuck", "dep:pollster"]

[dev-dependencies]
# Tests construct a HostPresentationRequest via the host API, which takes a
# kernel handle source. Test-only, so it never counts as a non-test dependency.
axiom-kernel = { path = "../../crates/axiom-kernel" }

# The live presentation arm: real wgpu + web-sys, pulled in ONLY for wasm32, so
# native `cargo test`/coverage never compiles them and the facade stays
# browser-free. This is a sanctioned platform-facing module (Module Law #9 /
# PLATFORM_FACING_MODULES). wgpu/bytemuck are required unconditionally on wasm32
# (the live arm always needs them, regardless of the `offscreen` feature).
#
# The `webgl` feature compiles wgpu's WebGL2 (GLES3) backend ALONGSIDE the
# default WebGPU backend, so the live arm can fall back to WebGL2 when a browser
# has no WebGPU (`live_gpu_binding::initialize` probes WebGPU first, then GL).
# It is additive — `webgpu` stays on via wgpu's default features. See
# docs/render-fallback.md.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["HtmlCanvasElement", "console"] }
wgpu = { version = "25", features = ["webgl"] }
bytemuck = "1"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
