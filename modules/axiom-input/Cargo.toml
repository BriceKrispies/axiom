[package]
name = "axiom-input"
description = "Axiom engine module: the engine's input contract. Folds a neutral, recordable DeviceFrame (keys down + pointer samples + surface) at each tick boundary into a deterministic per-tick intent snapshot of author-defined actions — keyboard edges, an action-binding table, pointer/click, swipe, and tick-stamped press. Gameplay reads only action names against a fixed Tick, so input is replayable and net-serializable. The browser event capture lives at the platform edge (the windowing module); this is the pure sampling core every app composes."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. No browser APIs: it consumes already-decoded pointer samples,
# so it runs and is tested on native exactly as it drives the web.
crate-type = ["rlib"]

[dependencies]
# An *engine module* (kind = "engine-module", allowed_modules = []): it composes
# NO other module. It builds on the math layer (`Vec2` for the move vector and
# pointer positions) and the kernel (`Radians` for look deltas).
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
