# Axiom module manifest — axiom-input (an ENGINE module).
#
# Device-agnostic intent synthesis. The platform edge (the windowing module)
# decodes raw browser PointerEvents — mouse, touch, and pen, which arrive in one
# unified shape — into neutral pointer samples; this module turns those samples,
# plus an on-screen virtual-control layout, into a normalized movement vector and
# look deltas an app maps to its first-person controller. It replaces the
# per-app, desktop-only pointer-lock + WASD decode and the gallery's synthetic-key
# keypad shim: touch is the primary input, and a mouse is just one more pointer
# source feeding the same synthesis.
#
# It is an ISOLATED engine module: it composes no other module
# (`allowed_modules = []`) and never touches a browser API (Module Law #9). Its
# whole surface is one facade, `TouchControls`, whose `update` returns a
# control frame reached only through it.

[module]
name = "input"
crate_name = "axiom-input"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "math",
]

allowed_modules = []

introduced_capabilities = [
    "virtual-touch-controls",
    "pointer-intent-synthesis",
]
