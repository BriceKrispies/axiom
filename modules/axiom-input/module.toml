# The platform edge (windowing module) decodes raw browser Keyboard/Pointer
# events into a neutral `DeviceFrame`; this module folds each frame, at a tick
# boundary, into a deterministic snapshot of author-defined actions, so
# gameplay reads action names against a fixed Tick rather than a physical key.

[module]
name = "input"
crate_name = "axiom-input"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "math",
]

allowed_modules = []

introduced_capabilities = [
    "input-intent-snapshot",
    "action-binding-table",
    "pointer-swipe-synthesis",
]
