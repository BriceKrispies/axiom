[package]
name = "axiom-net-protocol"
description = "Axiom engine module: the stable, deterministic multiplayer wire/message contract. Protocol data only — versioned little-endian frames for the client↔server messages (JoinRoom, LeaveRoom, ClientIntent, Welcome, ServerSnapshot, ServerEvent, RejectedIntent), with bounded opaque payloads. No sockets, no browser APIs; the transport lives at the app/package edge."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel supplies the binary writer/reader + schema version for the wire codec,
# the result/error model, and HandleId/FixedStep for the two validated fields
# (client id and fixed step must both be nonzero).
axiom-kernel = { path = "../../crates/axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
