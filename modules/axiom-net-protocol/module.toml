# The portable client state machine lives in the separate `axiom-client-core`
# module; the transport lives at the app/package edge (native app or the
# TypeScript `axiom-client` package).

[module]
name = "net-protocol"
crate_name = "axiom-net-protocol"
kind = "engine-module"

allowed_layers = [
    "kernel",
]

allowed_modules = []

introduced_capabilities = [
    "multiplayer-wire-contract",
    "client-to-server-messages",
    "server-to-client-messages",
    "bounded-opaque-payloads",
    "per-player-addressed-messages",
]
