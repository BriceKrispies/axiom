[package]
name = "axiom-netcode"
description = "Axiom engine module: the deterministic-lockstep networking core. Over a deterministic sim, only inputs cross the wire; this module owns the input timeline, the per-tick readiness gate, the wire codec, and state-hash reconciliation — all over plain bytes, with no sockets. The real transport plugs in at the app/edge later."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel: Tick/ids, wire codec, result/error model, and the seeded
# DeterministicRng (used by the convergence proof to model an adversarial network).
axiom-kernel = { path = "../../crates/axiom-kernel" }
# crypto: each input/beacon is signed by its author so a compromised peer or
# relay cannot forge another peer's inputs; verified on ingest against a
# roster of verifying keys.
axiom-crypto = { path = "../../crates/axiom-crypto" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
