[package]
name = "axiom-netcode"
description = "Axiom engine module: the deterministic-lockstep networking core. Over a deterministic sim, only inputs cross the wire; this module owns the input timeline, the per-tick readiness gate, the wire codec, and state-hash reconciliation — all over plain bytes, with no sockets. The real transport plugs in at the app/edge later."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. No sockets, no platform APIs: the deterministic session core
# speaks plain bytes; the app owns the socket loop (the nondeterministic edge),
# exactly as the windowing module isolates the live presentation arm.
crate-type = ["rlib"]

[dependencies]
# An *engine module* (kind = "engine-module"): it composes NO other module
# (allowed_modules = []). It builds only on the kernel's deterministic
# primitives — Tick/ids, the binary writer/reader + schema version for the wire
# codec, the result/error model, and the seeded DeterministicRng (used by the
# convergence proof to model an adversarial network).
axiom-kernel = { path = "../../crates/axiom-kernel" }
# The crypto layer: each input/beacon is signed by its author, so a compromised
# peer (or relay) cannot forge another peer's inputs. Verified on ingest against
# a roster of verifying keys.
axiom-crypto = { path = "../../crates/axiom-crypto" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
