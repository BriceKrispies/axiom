[package]
name = "axiom-perception"
description = "Axiom engine module: a deterministic, game-agnostic perception model for an embodied agent. Turns raw spatial sense-data (ray-fan probes, candidate entities) into observation facts in the agent's neutral fact shape, and tracks a subject's motion across ticks. Owns the sensor geometry and the fact vocabulary only — an app casts the rays against its own world (scene entities, a heightfield) and feeds the agent."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free, GPU-free, wasm-clean, deterministic, headless.
crate-type = ["rlib"]

# An isolated engine module (kind = "engine-module", allowed_modules = []) that
# composes only completed layers: the kernel (the `Radians`/`Meters` dimensioned
# quantities its public API speaks in) and math (the `Vec3`/`Quat` geometry of
# ray fans and view cones). It depends on no other module, no app, no tool.
[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
