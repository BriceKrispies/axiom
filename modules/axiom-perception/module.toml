# An app casts the rays against its own world and feeds the facts to
# `axiom-agent`, keeping perception decoupled from both scene and agent.

[module]
name = "perception"
crate_name = "axiom-perception"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "math",
]

# Perception speaks the agent fact shape as plain tuples, so it needs no
# dependency on `axiom-agent`.
allowed_modules = []

introduced_capabilities = [
    "agent-ray-fan-sight",
    "agent-view-cone-cull",
    "agent-perception-facts",
    "agent-subject-tracking",
]
