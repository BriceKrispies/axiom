[package]
name = "axiom-physics"
description = "Axiom Phase 1 deterministic rigid-body physics engine module (linear integration scaffold; no collision solving yet)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel: identity, dimensioned scalars, fixed step, errors. runtime:
# deterministic stepping vocabulary. math: Vec3/Transform.
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
