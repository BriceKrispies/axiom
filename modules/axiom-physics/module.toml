# Axiom physics engine module manifest.
#
# axiom-physics is an *isolated* engine module: it composes completed layers
# (kernel, runtime, math) into a deterministic rigid-body physics world. It
# never depends on another module, an app, or a tool, and never touches a
# scene, renderer, asset, input, animation, audio, ECS, plugin, or editor
# system. Composition (translating a PhysicsSnapshot into scene/render state)
# is the job of an app or a future feature module, never of physics itself.
[module]
name = "physics"
crate_name = "axiom-physics"
kind = "engine-module"
allowed_layers = [
  "kernel",
  "runtime",
  "math",
]
allowed_modules = []
introduced_capabilities = [
  "rigid-body-physics",
  "physics-body-handles",
  "physics-collider-handles",
  "physics-collider-shapes",
  "physics-materials",
  "physics-world-stepping",
  "physics-commands",
  "physics-events",
  "physics-snapshots",
  "physics-step-recording",
  "physics-queries",
]
