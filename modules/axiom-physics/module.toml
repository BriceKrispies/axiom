# Composition (translating a PhysicsSnapshot into scene/render state) is the
# job of an app or a future feature module, never of physics itself.
[module]
name = "physics"
crate_name = "axiom-physics"
kind = "engine-module"
allowed_layers = [
  "kernel",
  "runtime",
  "math",
]
allowed_modules = []
introduced_capabilities = [
  "rigid-body-physics",
  "physics-body-handles",
  "physics-collider-handles",
  "physics-collider-shapes",
  "physics-materials",
  "physics-world-stepping",
  "physics-commands",
  "physics-events",
  "physics-snapshots",
  "physics-step-recording",
  "physics-queries",
]
