[package]
name = "axiom-placement"
description = "Axiom engine module: deterministic object placement on the procedural-generation substrate. PlacementApi::scatter evaluates a draw-recipe at a content address and reduces each artifact word into an integer grid position, producing a reproducible Placement (a list of (x, y) cells) - the same (seed, address, count, bounds) always yields the same scatter. The first domain generator built ON the proc layers (Phase 9): a reusable capability, not app-local. Integer-only (no naked floats), branchless, one facade."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-space = { path = "../../crates/axiom-space" }
axiom-proc = { path = "../../crates/axiom-proc" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
