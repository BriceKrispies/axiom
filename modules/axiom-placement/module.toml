# Generation stays domain-light: a placement is just a list of integer grid
# positions; what is placed at them is a richer module's or an app's concern.

[module]
name = "placement"
crate_name = "axiom-placement"
kind = "engine-module"

allowed_layers = ["kernel", "space", "proc"]

allowed_modules = []

introduced_capabilities = [
    "object-scatter",
]
