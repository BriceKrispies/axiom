# Axiom module manifest — axiom-placement (an ENGINE module).
#
# The first DOMAIN generator built on the procedural-generation substrate
# (roadmap Phase 9): deterministic object placement. It is an *isolated engine
# module* (allowed_modules = []) that composes the proc layers - it depends on no
# other module. Generation stays domain-light: a placement is just a list of
# integer grid positions; what is placed AT them is a richer module's or an app's
# concern.
#
# It consumes space (the content Address it scatters at) and proc (the draw recipe
# it evaluates), plus the kernel for the canonical bytes + digest of a placement.
# Integer-only (no naked floats), branchless, and 100%-covered like every module.

[module]
name = "placement"
crate_name = "axiom-placement"
kind = "engine-module"

allowed_layers = ["kernel", "space", "proc"]

allowed_modules = []

introduced_capabilities = [
    "object-scatter",
]
