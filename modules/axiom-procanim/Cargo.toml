[package]
name = "axiom-procanim"
description = "Axiom engine module: deterministic procedural animation on the procedural-generation substrate. ProcAnimApi::animate turns (seed, address, tick) into an AnimatedTransform - a fixed-point position offset, yaw, and scale - by oscillating (a fixed-point sine table), ramping (continuous spin), and varying per-entity parameters drawn from an entropy stream keyed by the entity's content address. The same entity animates the same way every run and platform. Integer-only (no naked floats; the app converts to f32 at the GPU edge), branchless. The animation half of proc-driven rendering."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-space = { path = "../../crates/axiom-space" }
axiom-entropy = { path = "../../crates/axiom-entropy" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
