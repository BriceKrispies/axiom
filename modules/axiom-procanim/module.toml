# Axiom module manifest — axiom-procanim (an ENGINE module).
#
# The animation half of proc-driven rendering (the "make retro FPS procedurally
# animated" direction): deterministic procedural animation built ON the
# procedural-generation substrate. It is an *isolated engine module*
# (allowed_modules = []): it turns (seed, address, tick) into an animated
# transform and depends on no other module.
#
# It consumes space (the entity Address each animation is keyed by) and entropy
# (the keyed stream per-entity animation parameters are drawn from), plus the
# kernel for the AnimatedTransform's canonical bytes + digest. Integer fixed-point
# (no naked floats - an app converts to the engine's f32 Transform at the GPU
# edge), branchless, 100%-covered.

[module]
name = "procanim"
crate_name = "axiom-procanim"
kind = "engine-module"

allowed_layers = ["kernel", "space", "entropy"]

allowed_modules = []

introduced_capabilities = [
    "procedural-animation",
]
