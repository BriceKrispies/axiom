[package]
name = "axiom-recording"
description = "Axiom engine module: deterministic, memory-bounded per-frame artifact recording and a frame scrubber. Records opaque canonical bytes indexed by kernel FrameIndex/Tick; knows nothing about scenes, renderers, GPU, ECS, input, or the browser."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free, wasm-clean, platform-agnostic.
crate-type = ["rlib"]

[dependencies]
# An *isolated* engine module (allowed_modules = []): it composes NO other
# module. It builds only on the kernel layer — deterministic FrameIndex/Tick
# identity and KernelError/KernelResult. It never reads a clock, never knows
# what an artifact's bytes mean. `cargo xtask check-architecture` enforces this.
axiom-kernel = { path = "../../crates/axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
