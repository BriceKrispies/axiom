[package]
name = "axiom-recording"
description = "Axiom engine module: deterministic, memory-bounded per-frame artifact recording and a frame scrubber. Records opaque canonical bytes indexed by kernel FrameIndex/Tick; knows nothing about scenes, renderers, GPU, ECS, input, or the browser."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# kernel: deterministic FrameIndex/Tick identity and KernelError/KernelResult.
# Never reads a clock; never interprets what an artifact's bytes mean.
axiom-kernel = { path = "../../crates/axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
