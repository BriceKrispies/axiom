# Records per-frame artifacts as opaque canonical bytes; treats every
# higher-level artifact as an undifferentiated Vec<u8>. The scrubber UI
# belongs in apps/devtools, never here.

[module]
name = "recording"
crate_name = "axiom-recording"
kind = "engine-module"

allowed_layers = [
    "kernel",
]

allowed_modules = []

introduced_capabilities = [
    "deterministic-frame-recording",
    "bounded-frame-timeline",
    "frame-scrubbing",
    "determinism-reporting",
    "memory-bounded-capture",
]
