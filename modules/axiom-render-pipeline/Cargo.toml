[package]
name = "axiom-render-pipeline"
description = "Axiom feature module: composes scene + render + webgpu into the deterministic per-frame render pipeline (scene snapshot -> render commands -> GPU submission). The one place that translation lives."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
# host supplies SdfScene, the backend-neutral SDF contract this pipeline
# assembles (via axiom-render) for the live/canvas path. kernel supplies
# Ratio, the sanitized catalog scalar (roughness/opacity) the material asset
# boundary threads into the render layer's fully-specified lit material.
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-host = { path = "../../crates/axiom-host" }
axiom-scene = { path = "../axiom-scene" }
axiom-render = { path = "../axiom-render" }
axiom-webgpu = { path = "../axiom-webgpu" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
