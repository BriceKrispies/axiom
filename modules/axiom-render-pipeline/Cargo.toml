[package]
name = "axiom-render-pipeline"
description = "Axiom feature module: composes scene + render + webgpu into the deterministic per-frame render pipeline (scene snapshot -> render commands -> GPU submission). The one place that translation lives."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free and wasm-clean (the recording backend is used in
# tests; a live backend is supplied by the app).
crate-type = ["rlib"]

[dependencies]
# A *feature module* (kind = "feature-module"): it composes the engine modules
# listed in `module.toml`'s `allowed_modules`, plus the math and host layers.
# The host layer supplies `SdfScene` — the backend-neutral SDF contract this
# pipeline assembles (via `axiom-render`) and reports for the live/canvas path.
# The kernel root supplies `Ratio` — the sanitized catalog scalar
# (`roughness` / `opacity`) the material asset boundary threads into the render
# layer's fully-specified lit material. The lib now names it, so it is a runtime
# dependency (and `kernel` is listed in `module.toml`'s `allowed_layers`).
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-host = { path = "../../crates/axiom-host" }
axiom-scene = { path = "../axiom-scene" }
axiom-render = { path = "../axiom-render" }
axiom-webgpu = { path = "../axiom-webgpu" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
