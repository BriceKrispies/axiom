[package]
name = "axiom-render"
description = "Axiom engine module: scene-independent RenderInput → deterministic, backend-neutral RenderCommandList. No GPU, no scene/resources dependencies."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-frame = { path = "../../crates/axiom-frame" }
# Render compiles a RenderCommandList into the backend-neutral host::FramePacket
# (build_frame_packet) — the single artifact every render backend consumes.
axiom-host = { path = "../../crates/axiom-host" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
