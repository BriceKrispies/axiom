[module]
name = "render"
crate_name = "axiom-render"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "frame",
    # build_frame_packet returns host::FramePacket, consumed by both the GPU
    # and (later) Canvas 2D backends.
    "host",
]

allowed_modules = []

introduced_capabilities = [
    "render-input-construction",
    "backend-neutral-render-commands",
    "basic-lit-pipeline-marker",
    "deterministic-command-list",
    "backend-neutral-frame-packet",
]
