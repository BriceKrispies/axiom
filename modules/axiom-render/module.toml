# Axiom module manifest — axiom-render.

[module]
name = "render"
crate_name = "axiom-render"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "frame",
    # build_frame_packet returns host::FramePacket — the backend-neutral frame
    # artifact both the GPU backend (now) and the Canvas 2D backend (later)
    # consume. host is the lowest layer both backend modules can name.
    "host",
]

allowed_modules = []

introduced_capabilities = [
    "render-input-construction",
    "backend-neutral-render-commands",
    "basic-lit-pipeline-marker",
    "deterministic-command-list",
    "backend-neutral-frame-packet",
]
