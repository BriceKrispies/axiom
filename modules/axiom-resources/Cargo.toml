[package]
name = "axiom-resources"
description = "Axiom engine module: deterministic CPU-side resource descriptions (built-in cube mesh, basic lit material, solid-color texture). No file loading, no image decoding, no GPU."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-frame = { path = "../../crates/axiom-frame" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
