[package]
name = "axiom-scene"
description = "Axiom engine module: the deterministic 3D scene graph. Adapts the layer spine (math transforms + frame stepping) into stable scene state and snapshots."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-frame = { path = "../../crates/axiom-frame" }
# Nodes are entities; every node fact is a component column, and the
# transform hierarchy is a WorldSystem.
axiom-ecs = { path = "../../crates/axiom-ecs" }
axiom-zones = { path = "../../crates/axiom-zones" }

# Test-only: building a real HostFrameReport is the cleanest way to test
# scene's advance(&FrameContext) integration end-to-end.
[dev-dependencies]
axiom-host = { path = "../../crates/axiom-host" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
