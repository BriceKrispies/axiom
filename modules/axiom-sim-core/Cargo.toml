[package]
name = "axiom-sim-core"
description = "Axiom Phase 2 simulation substrate: a generic, deterministic fact / relation / definition / process / effect / causal-journal language. Domain-agnostic — it knows nothing about materials, bodies, fluids, jobs, rendering, scene, physics, or gameplay; later phases express those on top of it."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. Browser-free, GPU-free, wasm-clean.
crate-type = ["rlib"]

[dependencies]
# The simulation substrate builds on the kernel (identity, deterministic binary
# IO, Reflect) and the ECS layer (generational entity handles + liveness checks).
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-ecs = { path = "../../crates/axiom-ecs" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
