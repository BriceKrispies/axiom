# Axiom module manifest — axiom-sim-core (Phase 2 simulation substrate).
#
# sim-core is an *isolated* engine module. It adapts the kernel (identity,
# deterministic binary IO) and the ECS layer (generational entity handles +
# liveness) into a generic simulation language: facts, relations, definitions,
# processes, effects, and a causal journal. It is NOT a layer, owns no domain
# meaning (no materials/bodies/fluids/jobs/rendering/scene/physics/gameplay),
# and must not depend on any other module.

[module]
name = "sim-core"
crate_name = "axiom-sim-core"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "ecs",
]

# Modules may not depend on other modules. sim-core is fully isolated.
allowed_modules = []

introduced_capabilities = [
    "sim-identity-types",
    "sim-fact-model",
    "sim-relation-model",
    "sim-definition-registry",
    "sim-process-model",
    "sim-effect-model",
    "sim-causal-journal",
    "sim-core-facade",
]
