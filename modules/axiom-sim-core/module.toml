# Axiom module manifest — axiom-sim-core.
#
# Adapts kernel identity/binary-IO and ECS generational entity handles into a
# generic simulation language: facts, relations, definitions, processes,
# effects, and a causal journal. Owns no domain meaning (no materials/bodies/
# fluids/jobs/rendering/scene/physics/gameplay).

[module]
name = "sim-core"
crate_name = "axiom-sim-core"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "ecs",
]

allowed_modules = []

introduced_capabilities = [
    "sim-identity-types",
    "sim-fact-model",
    "sim-relation-model",
    "sim-definition-registry",
    "sim-process-model",
    "sim-effect-model",
    "sim-causal-journal",
    "sim-core-facade",
]
