[package]
name = "axiom-tick"
description = "Axiom timers + tick-driven state machines engine module: deterministic, wall-clock-free `after`/`every`/`cancel` timers and author-defined state machines, projected over the kernel's TickSchedule. Owns no domain meaning; the current tick is supplied each step."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
