# Axiom tick engine module manifest.
#
# Timers and tick-driven state machines built on the deterministic kernel
# Tick/TickDelta time and TickSchedule primitive. The current tick is supplied
# by the caller each step, so the module reads no clock.
[module]
name = "tick"
crate_name = "axiom-tick"
kind = "engine-module"
allowed_layers = [
  "kernel",
]
allowed_modules = []
introduced_capabilities = [
  "tick-timers",
  "tick-state-machines",
  "tick-facade",
]
