# Axiom module manifest — axiom-tween.
#
# Generic display-value animation: a number from->to over a duration under an
# ease curve, advanced by a presentation interval the app supplies.
#
# Deliberately not housed in `axiom-interface`: tween is non-UI value
# interpolation, so a non-UI consumer (a 2D sprite fade, a 3D value tween)
# should not have to drag in the interactive-panel layer. Presentation-class:
# every output is display-only and must never be read back into a `sim` API.
# The author onUpdate/onComplete closures live app-side keyed by `TweenId`;
# this module only hands back samples.

[module]
name = "tween"
crate_name = "axiom-tween"
kind = "engine-module"

allowed_layers = [
    "kernel",
]

allowed_modules = []

introduced_capabilities = [
    "tween-table",
    "easing-curves",
]
