# Axiom module manifest — axiom-visibility (an ENGINE module).
#
# Per-frame view-visibility: given a camera's clip-from-world matrix and a batch
# of world-space bounding boxes, which boxes intersect the view frustum (keep vs
# cull), and — given the camera position and a set of ascending distance bands —
# at what level of detail each box should render. This is the reusable "what does
# the camera actually see, and how finely" decision every rendered world needs,
# lifted out of any single app so a streamed world, a scene renderer, and a demo
# all compose the same culling + LOD logic instead of re-deriving it.
#
# It is an ISOLATED engine module: it composes no other module
# (`allowed_modules = []`) and never touches a browser API (Module Law #9). Its
# whole behavioral surface is one facade, `VisibilityApi`; it traffics only in
# lower-layer value types (`Mat4`, `Aabb`, `Vec3`, `Meters`) and plain `bool` /
# `u8` outcomes, so it exports no vocabulary of its own.
#
# Why a module, not a layer: frustum culling + LOD is a runtime capability apps
# and higher composers use, not an always-true engine primitive, and no lower
# layer genuinely *uses* it — wedging it into the spine would manufacture a
# ceremonial edge. It genuinely builds on `math` (the frustum/AABB geometry) and
# `kernel` (the `Meters` band type), so those are its `allowed_layers`.

[module]
name = "visibility"
crate_name = "axiom-visibility"
kind = "engine-module"

allowed_layers = [
    "kernel",
    "math",
]

allowed_modules = []

introduced_capabilities = [
    "frustum-visibility-culling",
    "distance-band-lod",
]
