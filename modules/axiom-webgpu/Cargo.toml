[package]
name = "axiom-webgpu"
description = "Axiom engine module: the WebGPU backend boundary. Defines a deterministic GpuSubmission shape and records what would be submitted. Real wgpu/web-sys integration is gated on missing host capabilities (see ARCHITECTURE.md)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-host = { path = "../../crates/axiom-host" }
axiom-frame = { path = "../../crates/axiom-frame" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
