# Axiom module manifest — axiom-webgpu.
#
# Backend boundary for WebGPU/WASM: routes one GpuSubmission contract through
# a Recording backend (deterministic record, no GPU) or a Live backend (built
# on the axiom-host presentation boundary, no real GPU work yet — see
# ARCHITECTURE.md).

[module]
name = "webgpu"
crate_name = "axiom-webgpu"
kind = "engine-module"

# The only module that depends on `host`: the WebGPU surface ultimately lives
# behind a host adapter.
allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "host",
    "frame",
]

allowed_modules = []

introduced_capabilities = [
    "gpu-submission-input",
    "gpu-submission-report",
    "deterministic-submission-record",
    "backend-boundary",
    "webgpu-backend-mode",
    "recording-backend",
    "live-backend-boundary",
    "gpu-submission-routing",
    "host-presentation-consumption",
]
