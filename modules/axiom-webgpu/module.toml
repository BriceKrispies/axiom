# Axiom module manifest — axiom-webgpu.
#
# Owns the backend boundary for WebGPU/WASM. Today it captures what
# WOULD be submitted to wgpu as a deterministic GpuSubmissionReport;
# real GPU device + surface creation is blocked on missing
# `axiom-host` capabilities (see ARCHITECTURE.md).

[module]
name = "webgpu"
crate_name = "axiom-webgpu"
kind = "engine-module"

# axiom-webgpu is the only module today that may depend on `host`
# because the WebGPU surface ultimately lives behind a host adapter.
allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "host",
    "frame",
]

allowed_modules = []

introduced_capabilities = [
    "gpu-submission-input",
    "gpu-submission-report",
    "deterministic-submission-record",
    "backend-boundary",
]
