[package]
name = "axiom-windowing"
description = "Axiom engine module: the deterministic presentation driver — assembles a validated host presentation request and drives the fixed per-frame tick loop. The platform (wasm/wgpu) presentation arm plugs in behind this deterministic core later; the core is browser-free and 100% testable on native."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-host = { path = "../../crates/axiom-host" }

# wasm32-only: keeps native `cargo test`/coverage from compiling the GPU
# backend, so the deterministic core stays browser-free. The run loop delegates
# each frame's real GPU draw to axiom-gpu-backend.
[target.'cfg(target_arch = "wasm32")'.dependencies]
axiom-gpu-backend = { path = "../axiom-gpu-backend" }
# Software fallback backend selected when there is no GPU, or when
# `?backend=canvas2d` forces it.
axiom-canvas2d-backend = { path = "../axiom-canvas2d-backend" }
# Drives the dev frame-scrubber overlay (records/re-presents frames);
# wasm32-only so the native genuine-dependency lint never sees an unused edge.
axiom-recording = { path = "../axiom-recording" }
# Interface layer (panels/draw list/drag/buttons) the frame-scrubber overlay is
# built on; same wasm32-only reasoning.
axiom-interface = { path = "../../crates/axiom-interface" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "EventTarget",
    "HtmlCanvasElement",
    "HtmlElement",
    "Node",
    "MouseEvent",
    "KeyboardEvent",
    "PointerEvent",
    "DomRect",
    "CssStyleDeclaration",
    "Location",
    "console",
] }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
