# Axiom module manifest — axiom-windowing (a FEATURE module).
#
# The deterministic presentation driver: turns plain viewport dimensions into a
# validated HostPresentationRequest and drives the fixed per-frame tick loop
# (canvas lookup + requestAnimationFrame + monotonic tick). The run loop
# delegates each frame's real GPU draw to axiom-gpu-backend's facade
# (GpuBackendApi); the deterministic *what/when* stays here, the impure wgpu
# *how* lives in the backend.

[module]
name = "windowing"
crate_name = "axiom-windowing"
kind = "feature-module"

allowed_layers = [
    "kernel",
    "host",
    # The neutral interface layer (panels / draw list / drag / buttons) that the
    # wasm frame-scrubber overlay is built on. Consumed only in the wasm32 arm.
    "interface",
]

allowed_modules = [
    "gpu-backend",
    "canvas2d-backend",
    "recording",
]

introduced_capabilities = [
    "presentation-request-assembly",
    "fixed-tick-presentation-loop",
    "frame-scrubber-overlay",
]
