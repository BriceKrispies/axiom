[package]
name = "axiom-world"
description = "Axiom feature module: the per-frame streaming-world plan. Composes the residency ring (which chunks are loaded around a moving focus) with visibility (which loaded chunks the camera sees, and at what level of detail) into one WorldApi::frame_plan call — the reusable policy a streamed, culled, LOD'd world runs each frame. Stateful only in the residency ring; the caller owns the chunk payloads and does the loading/drawing the plan directs."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
# Pure Rust rlib. No browser API: the plan is a deterministic function of the
# camera, the config, and the (residency) state, so it runs and is fully tested
# on native exactly as it drives a live frame.
crate-type = ["rlib"]

# A *feature module* (kind = "feature-module"): it COMPOSES the streaming and
# visibility engine modules into one per-frame plan. It also builds on the kernel
# (Meters quantities) and math (Vec3/Mat4/Aabb the plan reasons over).
[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-streaming = { path = "../axiom-streaming" }
axiom-visibility = { path = "../axiom-visibility" }

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
