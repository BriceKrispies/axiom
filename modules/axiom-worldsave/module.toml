# Axiom module manifest — axiom-worldsave.
#
# Save/delta model: stores only seed + version + address + dimensions + player
# deltas, never the full world; restore regenerates the world via levelgen and
# replays the deltas on top. The same {seed, deltas} shape underlies lockstep
# multiplayer (seed + command stream, never full state).

[module]
name = "worldsave"
crate_name = "axiom-worldsave"
kind = "feature-module"

allowed_layers = ["kernel", "space"]

allowed_modules = ["levelgen"]

introduced_capabilities = [
    "world-save-delta",
]
