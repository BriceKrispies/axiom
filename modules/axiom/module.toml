# Axiom module manifest — `axiom` (the engine umbrella).
#
# The one crate an app imports (`use axiom::prelude::*;`); composes the engine
# modules into the App/DefaultPlugins/Assets/SceneCommands surface so apps stop
# hand-wiring boundaries. Its single public facade is `pub mod prelude;`.

[module]
name = "engine"
crate_name = "axiom"
kind = "feature-module"

allowed_layers = [
    "kernel",
    "runtime",
    "math",
    "host",
    "frame",
    "ecs",
]

allowed_modules = [
    "scene",
    "resources",
    "render-pipeline",
    "webgpu",
    "windowing",
]

introduced_capabilities = [
    "engine-prelude",
    "app-frontend",
]
