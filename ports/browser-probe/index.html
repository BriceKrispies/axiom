<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browser Capability Probe</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 18px; max-width: 760px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { opacity: 0.7; margin: 0 0 16px; }
  .verdict { padding: 14px 16px; border-radius: 10px; font-size: 17px; font-weight: 700; margin: 16px 0; }
  .ok { background: #123d18; color: #7bf79a; }
  .bad { background: #4a1414; color: #ff8a8a; }
  .warn { background: #4a3a12; color: #ffd86b; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(128,128,128,.25); vertical-align: top; }
  td.k { white-space: nowrap; font-weight: 600; }
  td.v { width: 84px; text-align: center; font-weight: 700; }
  .pass { color: #33c06a; } .fail { color: #ff5b5b; } .na { opacity: .5; }
  .detail { opacity: .7; font-size: 13px; }
  textarea { width: 100%; height: 150px; margin-top: 14px; font-family: ui-monospace, monospace; font-size: 12px; }
  button { font: inherit; padding: 8px 14px; border-radius: 8px; cursor: pointer; margin-right: 8px; }
</style>
</head>
<body>
<h1>Browser Capability Probe</h1>
<p class="sub">Open this in the target (Citrix) browser. It reports which features a Godot / canvas game can rely on. No wasm engine is loaded &mdash; it only <em>tests</em> whether wasm can instantiate.</p>

<div id="verdict" class="verdict warn">Running&hellip;</div>
<table id="results"></table>

<p style="margin-top:16px">
  <button onclick="copySummary()">Copy summary</button>
  <button onclick="location.reload()">Re-run</button>
</p>
<textarea id="summary" readonly></textarea>

<script>
"use strict";
const results = [];
function add(key, ok, detail) { results.push({ key, ok, detail: detail || "" }); }

// Smallest real wasm: (module (func (export "f") (result i32) i32.const 42))
const WASM_BYTES = new Uint8Array([
  0,97,115,109, 1,0,0,0,
  1,5,1,96,0,1,127,
  3,2,1,0,
  7,5,1,1,102,0,0,
  10,6,1,4,0,65,42,11
]);

async function probe() {
  // --- WebAssembly: the make-or-break for Godot ---
  let wasmOk = false, wasmDetail = "";
  try {
    if (typeof WebAssembly !== "object") throw new Error("WebAssembly object absent");
    const mod = await WebAssembly.instantiate(WASM_BYTES);
    const r = mod.instance.exports.f();
    wasmOk = (r === 42);
    wasmDetail = wasmOk ? "instantiated + ran (f()=42)" : ("ran but wrong result: " + r);
  } catch (e) { wasmOk = false; wasmDetail = "BLOCKED: " + (e && e.message || e); }
  add("WebAssembly (Godot REQUIRES this)", wasmOk, wasmDetail);

  add("WASM.instantiateStreaming", typeof WebAssembly === "object" && typeof WebAssembly.instantiateStreaming === "function",
      "Godot uses it; falls back to arrayBuffer if absent (fine).");

  // --- Rendering ---
  const cv = document.createElement("canvas");
  let gl2 = null, gl1 = null;
  try { gl2 = cv.getContext("webgl2"); } catch (e) {}
  try { gl1 = cv.getContext("webgl") || cv.getContext("experimental-webgl"); } catch (e) {}
  add("WebGL2 (Godot default GPU render)", !!gl2, gl2 ? renderer(gl2) : "unavailable");
  add("WebGL1", !!gl1, gl1 ? renderer(gl1) : "unavailable");
  let c2d = false; try { c2d = !!cv.getContext("2d"); } catch (e) {}
  add("Canvas2D (software renderer fallback)", c2d, c2d ? "available" : "unavailable");

  // --- Threads / context ---
  add("SharedArrayBuffer", typeof SharedArrayBuffer === "function", "needed only for the THREADED wasm build");
  add("crossOriginIsolated", !!self.crossOriginIsolated, "COOP+COEP served & honored");
  add("Secure context (localhost/HTTPS)", !!self.isSecureContext,
      self.isSecureContext ? "yes" : "NO – Godot web refuses to run without it");

  render();
}

function renderer(gl) {
  try {
    const ext = gl.getExtension("WEBGL_debug_renderer_info");
    return ext ? (gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || "ok") : "ok";
  } catch (e) { return "ok"; }
}

function render() {
  const wasm = results.find(r => r.key.startsWith("WebAssembly"));
  const gl2 = results.find(r => r.key.startsWith("WebGL2"));
  const c2d = results.find(r => r.key.startsWith("Canvas2D"));
  const secure = results.find(r => r.key.startsWith("Secure"));
  const v = document.getElementById("verdict");
  if (!wasm.ok) {
    v.className = "verdict bad";
    v.textContent = "✗ WASM BLOCKED — Godot CANNOT run here. Use a pure-JS build (no wasm).";
  } else if (!secure.ok) {
    v.className = "verdict warn";
    v.textContent = "⚠ WASM ok, but NOT a secure context — Godot web needs HTTPS/localhost. Fix serving.";
  } else if (gl2.ok) {
    v.className = "verdict ok";
    v.textContent = "✓ Godot web works here — GPU (WebGL2) available; no canvas2d fallback needed.";
  } else if (c2d.ok) {
    v.className = "verdict ok";
    v.textContent = "✓ Godot web works here — no WebGL, but wasm + Canvas2D → use the canvas2d renderer (?backend=canvas2d).";
  } else {
    v.className = "verdict bad";
    v.textContent = "✗ No WebGL AND no Canvas2D — nothing can render. Investigate the browser lockdown.";
  }

  const t = document.getElementById("results");
  t.innerHTML = results.map(r =>
    `<tr><td class="k">${esc(r.key)}</td><td class="v ${r.ok ? "pass" : "fail"}">${r.ok ? "PASS" : "FAIL"}</td><td class="detail">${esc(r.detail)}</td></tr>`
  ).join("");

  document.getElementById("summary").value =
    "Browser capability probe\n" + navigator.userAgent + "\n" +
    "location: " + location.href + "\n\n" +
    results.map(r => (r.ok ? "PASS" : "FAIL") + "  " + r.key + (r.detail ? "  — " + r.detail : "")).join("\n") +
    "\n\nVERDICT: " + document.getElementById("verdict").textContent;
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function copySummary() { const s = document.getElementById("summary"); s.select(); try { document.execCommand("copy"); } catch (e) {} }

probe();
</script>
</body>
</html>
