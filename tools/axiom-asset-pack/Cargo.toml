# axiom-asset-pack — native asset packer (the producer side of the runtime
# asset-streaming pipeline whose deterministic core is `modules/axiom-assets`).
#
# Reads a human-authored TOML asset set, copies each source blob into an output
# directory under an id-based filename, computes a deterministic content hash +
# size for each blob, and emits the engine's binary manifest (`manifest.bin`)
# via `AssetsApi::encode_manifest`. The output round-trips through
# `AssetsApi::from_manifest_bytes`, so the runtime streaming brain consumes it
# directly.
[package]
name = "axiom-asset-pack"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "axiom-asset-pack"
path = "src/main.rs"

[lib]
name = "axiom_asset_pack"
path = "src/lib.rs"

[dependencies]
# The manifest format + validation are OWNED here — reuse, never reinvent.
axiom-assets = { path = "../../modules/axiom-assets" }
# AssetId identity primitive + the StableHash deterministic content digest.
axiom-kernel = { path = "../../crates/axiom-kernel" }
# Readable, derive-based TOML input — the format every Axiom manifest uses.
toml = "0.8"
serde = { version = "1", features = ["derive"] }

[lints.rust]
unsafe_code = "forbid"
