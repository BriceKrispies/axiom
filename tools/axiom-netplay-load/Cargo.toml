[package]
name = "axiom-netplay-load"
description = "Repo tooling: a headless load generator for the server-authoritative netplay backend. It speaks the canonical wire protocol via axiom-net-protocol and drives the real client state machine via axiom-client-core, opening many concurrent WebSocket players against a running node (or cluster) to measure single-node capacity, matchmaker throughput, scaleout distribution, and crash-recovery under load. Outside the engine dependency graph and the coverage gate (a Tool, by its tools/ location)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "axiom-netplay-load"
path = "src/main.rs"

[dependencies]
# The canonical multiplayer wire contract: the load client encodes/decodes the
# exact same frames the browser SDK and the .NET host do, so a load run can never
# drift from the real protocol. A tool may depend on a module (tools are outside
# the engine dependency graph).
axiom-net-protocol = { path = "../../modules/axiom-net-protocol" }
# The portable client-side state machine (connection state, sequence/pending
# bookkeeping) the browser logic mirrors — driving it here means each virtual
# player follows the real client lifecycle (connect → welcome → intent → ack).
axiom-client-core = { path = "../../modules/axiom-client-core" }

tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
tokio-tungstenite = "0.24"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
serde_json = "1"

[lints.rust]
unsafe_code = "forbid"
