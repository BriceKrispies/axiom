[package]
name = "axiom-netplay-server"
description = "Repo tooling: a minimal AUTHORITATIVE game server for the live netplay demo. Unlike the dumb lockstep relay, this server holds the authoritative state (two player cubes), accepts each client's JoinRoom (replying Welcome), integrates their ClientIntents, and broadcasts ServerSnapshots every fixed tick. It speaks the canonical wire format via the axiom-net-protocol module. Outside the engine graph and the coverage gate (a Tool, by its tools/ location)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "axiom-netplay-server"
path = "src/main.rs"

[dependencies]
# The canonical multiplayer wire contract: the server encodes/decodes the exact
# same frames the browser SDK does, so the two can never drift. A tool may depend
# on a module (tools are outside the engine dependency graph).
axiom-net-protocol = { path = "../../modules/axiom-net-protocol" }

# The engine umbrella module: the authority runs the AUTHORED game headlessly
# through `App`/`RunningApp::tick_with` + `snapshot_sim` (the same deterministic
# fixed-step surface `apps/axiom-game-runtime`'s `GameRuntime` wraps). A tool may
# depend on a module; it may NOT depend on the `axiom-game-runtime` app, so the
# authority composes this umbrella directly (SPEC-13 §3.5).
axiom = { path = "../../modules/axiom" }

# The crypto layer's HS256 JWT verifier: the authority verifies a join token's
# signature + expiry against a configured secret before admitting a player
# (SPEC-13 §16.4). The verify itself is pure spine (covered there); this tool owns
# the policy — the secret and the admit/reject decision. A tool may depend on a layer.
axiom-crypto = { path = "../../crates/axiom-crypto" }

tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
# Stream wrappers used to drive the accept loop, the fixed-step tick, and the
# per-peer bridge as branchless data transforms (the Branchless Law's gate fires
# in tools too — see `tools/axiom-netcode-relay`).
tokio-stream = { version = "0.1.18", default-features = false, features = ["net", "sync", "time"] }
tokio-tungstenite = "0.24"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
tokio-tungstenite = "0.24"
# The kernel's platform-stable digest (`StableHash`), used by the SPEC-13 §7
# cross-instance determinism golden to fingerprint each `ServerSnapshotFor`.
axiom-kernel = { path = "../../crates/axiom-kernel" }

[lints.rust]
unsafe_code = "forbid"
