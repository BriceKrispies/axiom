# Native headless screenshot / capture harness: ticks any registered slice's
# scene and renders it through a selected backend (`gpu` or `canvas2d`),
# byte-faithful to what the browser presents on that backend.
#
# It IS a workspace member so its parity tests run under `cargo test --workspace`
# and CI. The native GPU off-screen arm (real wgpu) is gated behind this crate's
# NON-DEFAULT `offscreen` feature so the workspace coverage/dylint gates — which
# build members with default features — never enable `axiom-gpu-backend/offscreen`
# and never compile that un-coverable native-wgpu arm into a module. Run the GPU
# path (and the GPU parity tests) with the feature on:
#   cargo run  -p axiom-shot --features offscreen -- --backend gpu ...
#   cargo test -p axiom-shot --features offscreen
# The canvas2d path and every non-GPU test run with the default build.
#
# axiom-shot is the sanctioned capture host: as a tool it legitimately loads the
# apps it renders (the capture-host role), allowed via the checker's
# CAPTURE_HARNESS_TOOLS allowlist (crates/xtask/src/class_check.rs).
[package]
name = "axiom-shot"
version = "0.1.0"
edition = "2021"

[dependencies]
axiom = { path = "../../modules/axiom" }
axiom-gpu-backend = { path = "../../modules/axiom-gpu-backend" }
axiom-canvas2d-backend = { path = "../../modules/axiom-canvas2d-backend" }
axiom-host = { path = "../../crates/axiom-host" }
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
# The SPEC-11 §7 translucency proof authors a translucent `RenderMaterial`
# directly at the render-API level (the umbrella `Material`→asset boundary
# drops `opacity`).
axiom-render = { path = "../../modules/axiom-render" }
# Each browser demo is its own standalone app crate; the harness depends on
# exactly the ones its registry renders.
axiom-gravix = { path = "../../apps/axiom-gravix" }
axiom-rotating-cube = { path = "../../apps/axiom-rotating-cube" }
axiom-sports-physics-lab = { path = "../../apps/axiom-sports-physics-lab" }
# The animation lab's posed-figure scene — captured as real pixels (L3), not SVG.
axiom-animation-lab = { path = "../../apps/axiom-animation-lab" }
png = "0.17"

[features]
# Native off-screen GPU rendering (real wgpu). NON-DEFAULT: enabling it turns on
# `axiom-gpu-backend/offscreen`, which must not unify into the module during the
# workspace coverage/dylint gates (see the header note). The `--backend gpu`
# path and the GPU parity tests require it.
offscreen = ["axiom-gpu-backend/offscreen"]
