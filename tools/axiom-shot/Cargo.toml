# Native headless screenshot tool: ticks an app's scene and renders it through
# a selected backend (`gpu` or `canvas2d`), byte-faithful to what the browser
# presents on that backend.
#
# NOT a workspace member (see the root Cargo.toml `exclude`): enabling the GPU
# `offscreen` feature here must not unify into the module during the workspace
# coverage/dylint gates, and depending on app crates must not enter the engine
# dependency graph the architecture checker validates.
[package]
name = "axiom-shot"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
axiom = { path = "../../modules/axiom" }
axiom-gpu-backend = { path = "../../modules/axiom-gpu-backend", features = ["offscreen"] }
axiom-canvas2d-backend = { path = "../../modules/axiom-canvas2d-backend" }
axiom-host = { path = "../../crates/axiom-host" }
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-math = { path = "../../crates/axiom-math" }
# The SPEC-11 §7 translucency proof authors a translucent `RenderMaterial`
# directly at the render-API level (the umbrella `Material`→asset boundary
# drops `opacity`).
axiom-render = { path = "../../modules/axiom-render" }
# Every browser demo lives here as a module (`axiom_gallery::retro_fps`, …); the
# tool screenshots them through this one crate.
axiom-gallery = { path = "../../apps/axiom-gallery" }
axiom-game-retro-fps = { path = "../../games/retro-fps" }
png = "0.17"
