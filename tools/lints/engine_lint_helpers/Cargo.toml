# Plain `rustc_private` rlib (not a dylint cdylib) linked into the lint crates.
[package]
name = "engine_lint_helpers"
version = "0.1.0"
description = "Shared rustc_private helpers for Axiom's dylint rulebook (engine-file scoping + zone-marker detection)"
edition = "2024"
publish = false

# No test harness of its own: a test binary would need to link `rustc_driver`,
# which only the dylint-provided driver supplies. Exercised via each lint's
# `ui/` fixtures instead.
[lib]
test = false
doctest = false

[package.metadata.rust-analyzer]
rustc_private = true
