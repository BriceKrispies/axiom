# Separate single-crate workspace (like tools/lints); proves a Rust test can
# actually execute on wasm32 (not just compile), for a future physics-determinism
# golden comparing wasm against native.
[package]
name = "axiom-wasm-runner-proof"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
axiom-kernel = { path = "../../crates/axiom-kernel" }
axiom-runtime = { path = "../../crates/axiom-runtime" }
axiom-math = { path = "../../crates/axiom-math" }
axiom-physics = { path = "../../modules/axiom-physics" }

[dev-dependencies]
# Pinned: wasm-bindgen-test 0.3.72 pulls wasm-bindgen 0.2.122, which must match
# the installed wasm-bindgen-test-runner/CLI version.
wasm-bindgen-test = "=0.3.72"
