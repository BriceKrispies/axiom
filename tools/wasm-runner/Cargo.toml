# Repo TOOLING — a deliberately SEPARATE, single-crate workspace (like
# `tools/lints`), so it is absent from the root `cargo metadata` and never
# touches the engine dependency graph, the Module Law's "every package must
# classify" checker, or the coverage gate. It exists only to PROVE that a Rust
# test can be executed on `wasm32` (not just compiled), so a future workstream
# can run a physics-determinism golden on wasm and diff it against native.
[package]
name = "axiom-wasm-runner-proof"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dev-dependencies]
# Pinned so the `wasm-bindgen` it pulls (0.2.122) matches the installed
# `wasm-bindgen-test-runner` / `wasm-bindgen` CLI (0.2.122) — the build and the
# runner must agree on the wasm-bindgen schema version. The test crate is
# versioned in the 0.3 series (0.3.72 -> wasm-bindgen 0.2.122).
wasm-bindgen-test = "=0.3.72"
