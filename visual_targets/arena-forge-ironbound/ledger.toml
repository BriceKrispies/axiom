claimed to score — a record-accuracy problem this entry corrects.

Re-scored the promoted render harshly against IDENTITY (bar =
"indistinguishable from reference.png"). Direct seed-vs-promoted comparison shows
GENUINE, real movement — the steel is now forged charcoal (closer to the
reference's dark iron than the seed's lighter grey), a key light now shapes some
form/gradient on the torsos (vs the seed's flat ambient wash), the darker
charcoal against black gives punchier range, the pauldrons flare into a wider
heroic stance, and the head box carries a faint visor/brow bar. This is real
convergence, NOT number-gaming.

