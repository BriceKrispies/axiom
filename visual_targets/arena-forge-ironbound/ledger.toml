crude BOX-FIGURE proxy: stacked flat boxes, rigid yellow slab "capes", box
shoulders, spike proxies — no plate segmentation, no rivets, no great-helm form,
no glowing eyes, no shields/banners, no plinths, no warm rim light. Per the
take-the-lower rule, color_palette (2), lighting_and_shadow (1),
contrast_and_exposure (1), and helmet_and_head (1) all HOLD despite real
sub-threshold gains — bumping them to advertise progress the image has not earned
would be inflation, which this lens exists to prevent.

Calibration verdict: scores are HONEST. Every axis holds at its round-1 value.
No axis regressed (the darkening makes figures recede into black without rim
separation, but the reference figures are dark-on-black too, so no axis drops
>=2). lowest_axis = 1 (eight-way tie); fixed axis order breaks the tie to
subject_fidelity — still the correct next attack.

Abstraction gate: HONORED. The six lens changes are bounded parameter/geometry
iterations in the app's own pure-TS figure/render code (FIT ratio, helm brow
geometry, a key light, a material color, a pose) using existing @axiom/web-engine
primitives — no new engine primitive/field/shader was introduced, so no
abstractions/NNNN.toml is owed (abstraction_introduced = false). subject_fidelity
has had 1 bounded attempt (the modeler helm) — well under the >=3 budget before an
abstraction could be justified.

Parity: none claimed. Commit messages and records are clean of
"done/matched/parity" language. final_score holds at 1.12; the road to parity is
still structural (real helm/plate/limb geometry), starting at subject_fidelity.
"""
