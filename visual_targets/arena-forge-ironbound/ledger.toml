champion_screenshot = "champion.png"
candidate_screenshot = "champion.png"
decision = "scoring_recalibration"
reason = """
Critic lens ROUND-1 seed calibration. The record was seeded (commit 83e7eb85)
with only champion.png + reference.png and capture tooling — no scorecard and no
ledger — so no calibrated baseline existed for the loop to trust. This entry
establishes that baseline; it is not a recalibration of a prior (non-existent)
scorecard.

Substrate: arena-forge "Figure Lab / Ironbound gallery" is a PURE-TYPESCRIPT app
on @axiom/web-engine, not the Rust engine.

Scored the champion harshly against IDENTITY (bar = "indistinguishable from
reference.png", not "reads as an armored figure"). The reference is a polished
low-poly gallery of eight distinct plate knights — great-helms with visor slits
and glowing eyes, beveled bronze pauldrons, segmented riveted torso plates with
gear emblems, articulated plate limbs, flowing torn olive capes, per-unit weapons
(cross shield, drill arm, gear banners), plinths, warm rim light. The champion is
a crude BOX-FIGURE proxy: stacked flat grey boxes (box head with a thin slot, box
torso, box legs), flat rigid yellow rectangle "capes", orange box shoulders / an
orange square chest emblem, and a few spike proxies (a grey drill-spike, yellow
head plumes). No helm form, no plate segmentation, no rivets, no shields, no
plinths, flat ambient shading.

Result: the gallery SHELL is the strongest match (4x2 grid, "IRONBOUND" header +
"8" count, name/tier labels, orange-bordered selected "Iron Vanguard" tile), so
composition_and_framing, color_palette, and scale_and_proportion sit at 2 and a
clean render earns artifact_level 3; the eight IDENTITY axes (subject_fidelity,
silhouette_readability, armor_plating_detail, helmet_and_head,
weapons_and_attachments, cape_and_cloth, lighting_and_shadow,
contrast_and_exposure) all sit at 1. lowest_axis = 1 (eight-way tie); fixed axis
order breaks the tie to subject_fidelity. average = 1.42, final_score = 1.12.

Abstraction gate: no structural change has been made yet — champion.png is the
seed render — so no abstractions/NNNN.toml record is owed
(abstraction_introduced = false).

Parity: none claimed. The champion is a box proxy at final_score 1.12; the road
to parity is structural (real helm/plate/limb geometry), starting at
subject_fidelity.
"""
next_attacked_axis = "subject_fidelity"
abstraction_introduced = false

