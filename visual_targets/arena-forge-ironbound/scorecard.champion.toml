# Champion scorecard — arena-forge-ironbound  (ROUND 6, critic re-score of the
# PROMOTED pass-5 render)
#
# Substrate: pure-TypeScript arena-forge "Figure Lab / Ironbound gallery" on
# @axiom/web-engine (NOT the Rust engine).
#
# What changed since round 5: the champion.png was replaced by the PROMOTED pass-5
# render at base fbf937c1 ("arena-forge: pass-5 Ironbound convergence (re-tuned for
# the new shading)"). That promotion commit bundled the new PNG + six app-tier lens
# edits (bodyplans.ts, languages/index.ts, scene/arena-scene.ts, figure-lab.ts) but
# CARRIED THE ROUND-5 SCORECARD/LEDGER FORWARD UNCHANGED — the scorecard it shipped
# still described (and scored) the ROUND-5 RE-SEED render at base 6eb42738, not the
# pass-5 image it now sits beside. So — exactly as in rounds 2/3/4/5 — the record no
# longer matched the image it claims to score. This round-6 pass re-scores the
# PROMOTED pass-5 render FROM SCRATCH against the same identity bar (the prior 1.12
# was NOT assumed) so the record matches the image again.
#
# The pass-5 lens edits (per the promotion commit body): key-dominant gallery
# lighting rig (1.85 -> 2.45, fills cut) for plate contrast; brighter satin steel +
# tighter metal roughness (0.22 -> 0.16) so the new specular reads as forged metal;
# warmer burnt-bronze accent trim; modeler articulated arms (upper arm + beveled
# forearm + gauntlet fist, mirrored so BOTH arms terminate in a fist — fixing the
# handless mirrored-left-arm bug); rigger shoulder-wide planted leg stance (the
# thighs were fusing into one pillar); art-director gallery FIT 0.86 -> 0.70.
#
# The visible movement over the round-5 re-seed is a MATERIAL + SILHOUETTE tune: the
# steel reads a touch brighter/satin under the punchier key, the accent trim is a
# warmer bronze, both arms now terminate in a fist (a real artifact fix over the
# prior handless mirrored arm), and the wider planted stance splits the previously
# fused leg-pillar into two legs. This is REAL, honest movement — NOT number-gaming.
#
# BUT — re-scored FROM SCRATCH, harshly, against IDENTITY — none of it crosses a
# full identity point. The render STILL unmistakably reads as a STACK OF SHADED
# BOXES on a dark field: no great-helm form, no segmented/riveted plate, no glowing
# eyes, no draped torn cloth, no warm directional RIM light, no dramatic painted
# chiaroscuro, mustard-not-olive capes, no shields/drills/banners, no plinth
# stonework. The pass-5 work is surface polish + box-recomposition ON the boxes, not
# an identity crossing. I explicitly considered 1->2 bumps on the material/
# silhouette-adjacent axes the pass-5 work most touches (armor_plating_detail,
# silhouette_readability, lighting_and_shadow, contrast_and_exposure) and HELD all
# of them per take-the-lower (reasoned per axis below). All twelve values are
# therefore UNCHANGED from round 5 — the pass-5 movement is real but SUB-THRESHOLD.
# SIXTH-round plateau at 1.12.
#
# NOTE (art-director FIT, wrong-direction AGAIN): pass-5 pushed FIT 0.86 -> 0.70,
# SHRINKING the figures further. Round 3 already flagged the shrink direction as
# wrong for composition (the reference figures FILL ~75-85% of their cells; the
# champion units now sit smaller with more black margin and no plinth). This is the
# OPPOSITE of what that missed-direction flag asked for. It does NOT drop
# composition >=2 (grid/header/labels/selected-tile still match strongly), so the
# axis HOLDS at 2 — but the direction is re-flagged for the art-director: the target
# is a filled hero portrait, not a further-shrunken centered figurine.
#
# The reference is a polished low-poly art gallery: eight distinct armored knights
# in dark iron PLATE — great-helms with visor slits and glowing eyes, beveled
# bronze pauldrons, segmented riveted torso plates with gear emblems, articulated
# plate limbs, flowing torn olive capes/tabards, per-unit weapons (cross shield,
# drill arm, gear banners), each on a stone plinth, warm rim-lit against black,
# with name + tier labels and a warm-glowing selected tile.
#
# The champion is STILL a crude BOX-FIGURE proxy — now with brighter satin
# materials, a warmer bronze trim, two-fisted arms, and a wider two-leg stance: each
# unit is a stack of boxes (single-box head with at most a faint visor band, box
# torso bearing a copper ring/gear emblem, box arms terminating in box fists, box
# legs planted shoulder-wide on a lighter plinth/base block), flat mustard-olive
# rectangular slabs standing in for capes, burnt-bronze box shoulders, and — on
# some — a single spike for a plume/banner. There is still no helm FORM, no plate
# segmentation, no rivets, no clearly-read plate layers, no shields, no plinth
# stonework, and the capes still float detached.
#
# Scored HARSHLY against IDENTITY: the bar is "indistinguishable from
# reference.png", NOT "reads as an armored figure". When unsure between two scores,
# the LOWER was taken. The pass-5 render shows GENUINE but SUB-THRESHOLD movement on
# the material/silhouette axes — real convergence that does NOT yet cross a full
# identity point. Per take-the-lower those axes HOLD; they are not bumped to
# manufacture visible "progress" (that would be number-gaming — exactly what this
# lens exists to prevent).
#
# PLATEAU: final_score has now held at 1.12 for SIX straight rounds (seed, pass-1,
# pass-2, pass-3, re-seed, pass-5). subject_fidelity has absorbed FOUR bounded
# box-geometry attempts (round-1 helm brow, round-2 legs+boots, round-3
# chest-emblem+side-arms, pass-5 articulated two-fisted arms) plus the re-seed's
# beveled/layered material enrichment, and STILL reads 1. The abstraction gate for
# subject_fidelity has been OPEN since round 4 (>=3 failed bounded attempts + the
# box vocabulary is genuinely inexpressive of plate-knight form). Pass-5 again
# attacked subject_fidelity with a BOUNDED BOX edit (more boxes for arms) rather
# than building the justified real figure-MESH/plate primitive — so the plateau
# persists and the escape route identified two rounds ago is STILL not taken. That
# is not a gate violation (nudging boxes stays permitted) and not number-gaming
# (scores held honestly), but it is a stalled-campaign signal worth recording.
#
# ABSTRACTION RECORD owed THIS round: NO. Pass-5's modeler change ("articulated
# arms: upper arm + beveled forearm + gauntlet fist, mirrored") is box/geometry
# COMPOSITION using existing @axiom/web-engine primitives (more boxes + a bevel + a
# mirror fix) — NOT a genuinely new figure-mesh/plate primitive; the rigger stance,
# lighting rig, roughness, colorist trim and art-director FIT are all bounded
# parameter edits. So abstraction_introduced = false and no abstractions/NNNN.toml
# is owed. A record IS owed by the future pass that finally BUILDS a genuine new
# FIGURE-mesh/plate primitive to move subject_fidelity off 1 (inexpressible = true,
# failed_attempts = the four box-geometry subject_fidelity attempts above, plus the
# smallest-API note). Backfilling one now, for a primitive that still does not
# exist, would be a ceremonial/fabricated record — exactly the dishonesty this lens
# guards against.
#
# final_score = lowest_axis * 0.7 + average_axis * 0.3
# Lowest axis (ties broken by the fixed order below) = the next flaw to attack.

[scores]
