# a little more of each cell than pass-2's shrunken figurines, but the reference
# figures still FILL their tiles (~75-85% of cell height) while the champion units
# sit smaller (~60-70%) with more black margin and no plinth. The round-3
# missed-direction flag (art-director FIT shrink) is NOT yet re-attacked, but grid/
# header/labels/selected-tile all still match strongly, so composition HOLDS at 2.
# Not yet 3.
