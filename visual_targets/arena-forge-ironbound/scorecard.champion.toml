# Champion scorecard — arena-forge-ironbound  (ROUND 5, critic re-score of the
# RE-SEEDED champion — new build: specular/Fresnel + highlight tonemap + per-vertex
# AO + enriched geometry)
#
# Substrate: pure-TypeScript arena-forge "Figure Lab / Ironbound gallery" on
# @axiom/web-engine (NOT the Rust engine).
#
# What changed since round 4: the champion.png at base 6eb42738 ("champion: re-seed
# with current build (specular/tonemap/AO + enriched geometry)") is NO LONGER the
# pass-3 flat-Lambert box render. Since round 4 the @axiom/web-engine spine itself
# gained REAL specular/Fresnel highlights, a highlight tonemap, and per-vertex AO,
# and the figures gained beveled plates, layered armor, roughness authoring, and
# contact shadows — and champion.png was RE-SEEDED onto that new build. The re-seed
# commit swapped ONLY the PNG (a binary swap; it touched no scorecard, no ledger, no
# app source), so — exactly as in rounds 2/3/4 — the prior scorecard scored (and
# described) the OLD image and no longer matched the image it claims to score. This
# round-5 pass re-scores the RE-SEEDED render FROM SCRATCH against the same identity
# bar (the prior 1.12 was NOT assumed) so the record matches the image again.
#
# The visible movement over the pass-3 render is a MATERIAL/SHADING upgrade: the box
# faces now carry directional specular pops on their top edges, AO darkening in the
# crevices and leg-gaps, a tonemapped highlight roll-off, and a soft contact shadow
# under the base — a genuine step up from the pass-3 flat-Lambert wash. The figure
# geometry reads marginally richer (a faint beveled/layered plate hint). This is
# REAL convergence, NOT number-gaming.
#
# BUT — re-scored FROM SCRATCH, harshly, against IDENTITY — none of it crosses a
# full identity point. The render still unmistakably reads as a STACK OF SHADED
# BOXES on a dark field: no great-helm form, no segmented/riveted plate, no glowing
# eyes, no draped torn cloth, no warm directional RIM light, no dramatic painted
# chiaroscuro, mustard-not-olive capes. Every DEFINING per-axis reference feature is
# still absent; the new engine work is surface polish ON the boxes, not an identity
# crossing. I explicitly considered a 1->2 bump on the three material-adjacent axes
# the engine work most touches — lighting_and_shadow, contrast_and_exposure and
# armor_plating_detail — and HELD all three per take-the-lower (reasoned per axis
# below). All twelve values are therefore UNCHANGED from round 4 — the re-seed
# movement is real but SUB-THRESHOLD. FIFTH-round plateau at 1.12.
#
# The reference is a polished low-poly art gallery: eight distinct armored knights
# in dark iron PLATE — great-helms with visor slits and glowing eyes, beveled
# bronze pauldrons, segmented riveted torso plates with gear emblems, articulated
# plate limbs, flowing torn olive capes/tabards, per-unit weapons (cross shield,
# drill arm, gear banners), each on a stone plinth, warm rim-lit against black,
# with name + tier labels and a warm-glowing selected tile.
#
# The champion is STILL a crude BOX-FIGURE proxy — now with better materials: each
# unit is a stack of boxes (single-box head with a faint visor band, box torso
# bearing a copper ring/gear emblem, box arms at the sides, box legs on a lighter
# plinth/base block), flat mustard-olive rectangular slabs standing in for capes,
# burnt-copper box shoulders, and — on some — a single spike for a plume/banner or a
# drill. The re-seed added directional specular highlights, per-vertex AO, a
# tonemapped highlight roll-off, a soft contact shadow, and a faint beveled/layered
# plate hint, but there is still no helm FORM, no plate segmentation, no rivets, no
# clearly-read plate layers, no shields, no articulated limbs, no plinth stonework.
#
# Scored HARSHLY against IDENTITY: the bar is "indistinguishable from
# reference.png", NOT "reads as an armored figure". When unsure between two scores,
# the LOWER was taken. The re-seeded render shows GENUINE but SUB-THRESHOLD movement
# on the material/shading axes (lighting, contrast, armor material read) — real
# convergence that does NOT yet cross a full identity point. Per the take-the-lower
# rule those axes HOLD; they are not bumped to manufacture visible "progress" (that
# would be number-gaming — exactly what this lens exists to prevent).
#
# PLATEAU: final_score has now held at 1.12 for FIVE straight rounds (seed, pass-1,
# pass-2, pass-3, re-seed). subject_fidelity has absorbed THREE bounded box-geometry
# attempts (round-1 helm brow, round-2 legs+boots, round-3 chest-emblem+side-arms)
# plus this re-seed's beveled/layered geometry enrichment, and STILL reads 1. The
# abstraction gate for subject_fidelity is OPEN (>=3 failed bounded attempts + the
# box vocabulary is genuinely inexpressive of plate-knight form); the re-seed did
# NOT build the real figure-mesh/plate primitive that would break the plateau — its
# geometry enrichment is still box-composition riding NEW ENGINE-LEVEL material
# features (specular/Fresnel/tonemap/AO). Those engine features are general
# @axiom/web-engine spine capabilities that landed independently and are governed by
# the engine's OWN gates (ts-gate, coverage, branchless) — they are NOT
# convergence-introduced app primitives, so no abstractions/NNNN.toml is owed HERE.
# A record IS owed by the future pass that finally builds a genuine new FIGURE-mesh/
# plate primitive to move subject_fidelity off 1.
#
# final_score = lowest_axis * 0.7 + average_axis * 0.3
# Lowest axis (ties broken by the fixed order below) = the next flaw to attack.

[scores]
