decision = "scoring_recalibration"
reason = """
Critic lens seed calibration. The record was seeded with champion.png +
reference.png and no scorecard, so no calibrated baseline existed for the loop
to trust. Scored the champion harshly against identity: the champion is a high
tilted overhead of a washed, near-empty field; the reference is an eye-level
ground cam behind the offensive backfield in a vivid, populated low-poly
stadium. The two frame different moments and different worlds, so 10 of 12 axes
sit at 1 and two sit at 0 (composition_and_framing, stadium_environment).
final_score = 0.25. No structural change has been made yet, so no abstraction
record is owed.
"""
next_attacked_axis = "composition_and_framing"
abstraction_introduced = false

