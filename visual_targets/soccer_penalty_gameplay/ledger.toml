# Visual-convergence ledger — soccer penalty gameplay viewport.
# Target: the cropped main 3D gameplay viewport of reference/soccer-penalty-kick.png
# (kicker, ball, goal, keeper, reticle, field, stadium) — not the right-side/bottom UI sheet.
# Harness: tools/axiom-shot --app soccer-penalty --backend gpu (native offscreen, 960x600,
# byte-deterministic: identical md5 on a double render). Score 0..5, harsh; a proxy = 1.
# final_score = lowest_axis*0.7 + average_axis*0.3. Attack the lowest axis, one per pass.

[[iteration]]
iteration = 1
attacked_axis = "composition_and_framing"
changed_files = ["apps/axiom-gallery/src/soccer_penalty/static_diorama.rs"]
champion_screenshot = "champion.png"
candidate_screenshot = "candidate.png"
decision = "keep_candidate"
reason = """
Reframed the fixed shot camera to the reference composition: FOV 44->32 (the main cause of \
everything reading small/distant), eye lowered + pulled back to (1.2,3.8,18.8), target aimed low \
at the goal line (-0.35,-1.3,0.0) so the vertical frame spans the goal (near the horizon) down to \
the close kicker's feet. Result: kicker large in the left foreground seen from behind (full body), \
goal centred in the upper-middle at ~half width, ball lower-middle, keeper centred in the goal, a \
crowd band above the goal, field lines in perspective. composition_and_framing 1->3 and \
camera_lens_and_scale 1->3; every non-attacked axis held or rose (none dropped), so promote. \
App-only change (camera constants); no engine/kernel/runtime/math edits, no new primitives, no \
animation, no crowd-noise/cosmetic edits. Byte-deterministic (md5 a743652a…).
"""
next_attacked_axis = "goalkeeper_silhouette"
abstraction_introduced = false

