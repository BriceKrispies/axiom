composition_and_framing   = 3  # unchanged — kicker foreground / ball centre / goal upper-mid roughly tracks the reference layout.
camera_lens_and_scale     = 2  # LOWERED 3->2. FOV/scale is off vs reference: the keeper is a tiny thumbnail in the goal and the goal proportions are squashed; framing is in the neighbourhood but the lens/scale does not match.
kicker_silhouette         = 2  # LOWERED 3->2. Reads as a blocky back-facing player with a faint "10", but the silhouette is angular/coarse and the number/arms barely resolve — a recognizable proxy, not the reference's clean low-poly figure. A 3 would need a clearly-read player form.
goalkeeper_silhouette     = 1  # LOWERED 2->1. Still a barely-humanoid yellow blob, a thumbnail in the goal mouth — a proxy. NOTE: the render DOES use PenaltyGoaliePose::idle_display() (penalty_scene.rs:348), a save-volume-DECOUPLED render-only arms-out stance, so the earlier "ready stance reverted, out of scope, moves save volumes" narrative is false and the +1 it justified was inflated. Harsh identity read = proxy = 1.
ball_fidelity             = 2  # unchanged — a recognizable black/white ball, but blocky/dithered.
goal_and_net_fidelity     = 1  # unchanged — still a boxy wireframe cage, not a white frame + hanging net.
field_markings_and_turf   = 1  # LOWERED 2->1. Flat green with two stray white lines; NO penalty spot, NO box, NO arc, NO mow stripes. A turf proxy, not the reference's marked pitch.
stadium_and_ad_boards     = 1  # LOWERED 2->1. Ad boards are dark illegible blocks (reference: crisp red "AXIOM SPORTS"); crowd is a dithered noise band. Illegible = proxy = 1.
lighting_shadow_and_depth = 2  # unchanged — hard blob shadows under the actors, flat fill.
gameplay_readability      = 2  # unchanged — reads as a penalty setup (kicker/ball/goal/keeper) but no reticle, no HUD, no power bar.
artifact_level            = 1  # LOWERED 2->1. Heavy ordered-dither banding + the wireframe-goal artifact dominate the frame; the reference is clean. Harsh = 1.

