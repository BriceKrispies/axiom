reason = "No intended visual change (champion visually identical; md5 differs only from material-dedup batch regrouping, which the per-instance geometric depth bias still resolves). UNIFIED the champion and the live gallery onto ONE shared PenaltyMeshedScene: the headless champion (axiom-shot -> soccer_meshed_app) and the browser gallery (soccer_penalty_start) now register the SAME mesh library and author via the SAME select_mesh mapping + runtime spawn/despawn. Deleted the old box authoring (author_soccer/soccer_live_app); the gallery no longer uses reauthor (which rebuilds the mesh store from the catalog-only closure and would wipe custom meshes). Native tests + wasm build both green. So what a user sees in the gallery is what the convergence loop scores."
