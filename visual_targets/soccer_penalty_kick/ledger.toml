[[iteration]]
iteration = 2
attacked_axis = "composition_and_framing"
changed_files = [
  "apps/axiom-gallery/src/soccer_penalty/static_diorama.rs",
  "apps/axiom-gallery/src/soccer_penalty/penalty_scene.rs",
  "apps/axiom-gallery/tests/soccer_penalty_stage1_diorama.rs",
  "apps/axiom-gallery/tests/soccer_penalty_pass2_depth_ordering.rs",
]
champion_screenshot = "champion.png"
candidate_screenshot = "candidate.png"
decision = "keep_candidate"
reason = "composition_and_framing 3->4: pulled the eye back+up and reduced the wall height so the FULL kicker + ball sit in the lower frame (no longer cut off) and the crowd fills down close to the goal (dead dark band gone). subject_fidelity/silhouette/depth/scale improved with the fuller framing; no non-attacked axis dropped. Integration count/fov tests updated to match the new composition. Promoted."
next_attacked_axis = "ball_fidelity"   # now the lowest (1): plain white sphere, no soccer pattern

