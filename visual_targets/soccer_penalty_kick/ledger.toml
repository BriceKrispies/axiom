# Append-only convergence ledger — soccer penalty kick.
# Harness: tools/axiom-shot --app soccer-penalty --backend gpu (native offscreen,
# byte-deterministic; verified identical md5 on a double render).

[[iteration]]
iteration = 1
attacked_axis = "composition_and_framing"
changed_files = [
  "apps/axiom-gallery/src/soccer_penalty/static_diorama.rs",
  "apps/axiom-gallery/src/soccer_penalty/penalty_scene.rs",
  "apps/axiom-gallery/src/soccer_penalty/penalty_materials.rs",
  "apps/axiom-gallery/src/soccer_penalty/low_poly_assets.rs",
  "tools/axiom-shot/src/main.rs",
]
champion_screenshot = "champion.png"
candidate_screenshot = "candidate.png"
decision = "keep_candidate"
reason = "composition_and_framing 1->3 (kicker screen-left, elevated, goal centred/larger); no non-attacked axis dropped, and stadium_and_crowd 1->3, color_palette/contrast/lighting/scale all 2->3 came along as coupled backdrop/palette wins. Aggressive first-pass bundle per user request. Promoted."
next_attacked_axis = "composition_and_framing"   # still the dominant flaw: kicker/ball cut off at bottom, dead dark gap above goal

[iteration.scorecard_before]
composition_and_framing = 1
subject_fidelity        = 1
silhouette_readability  = 2
pitch_detail            = 2
